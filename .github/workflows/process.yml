name: Process Articles

on:
  schedule:
    - cron: '47 */3 * * *'  # Every 3 hours at :47 (30min after crawl)
  workflow_dispatch: {}

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      LLM_API_KEY: ${{ secrets.LLM_API_KEY || secrets.ANTHROPIC_API_KEY }}
      LLM_BASE_URL: ${{ secrets.LLM_BASE_URL || secrets.ANTHROPIC_BASE_URL }}
      LLM_MODEL: ${{ secrets.LLM_MODEL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 npm install --no-audit --no-fund
      - run: npx tsx scripts/process.ts
