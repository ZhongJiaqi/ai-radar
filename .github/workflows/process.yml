name: Process Articles

on:
  schedule:
    - cron: '47 */3 * * *'  # Every 3 hours at :47 (30min after crawl)
  workflow_dispatch:
    inputs:
      batch_size:
        description: 'New-article batch size (default 50)'
        required: false
        default: '50'
      reprocess_batch_size:
        description: 'Fallback reprocess batch size (default 50)'
        required: false
        default: '50'
      timeout_minutes:
        description: 'Job timeout in minutes (default 15)'
        required: false
        default: '15'

concurrency:
  group: process-articles
  cancel-in-progress: false

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ fromJSON(inputs.timeout_minutes || '15') }}
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
      LLM_MODEL: ${{ secrets.LLM_MODEL }}
      BATCH_SIZE: ${{ inputs.batch_size || '50' }}
      REPROCESS_BATCH_SIZE: ${{ inputs.reprocess_batch_size || '50' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 npm install --no-audit --no-fund
      - run: npx tsx scripts/process.ts
