name: AI Jobs Pipeline

on:
  schedule:
    - cron: '17 */3 * * *'  # Every 3 hours
  workflow_dispatch: {}

jobs:
  jobs:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
      # Optional (XHS): ENABLE_XHS=1, XHS_MCP_URL=http://localhost:18060/mcp
      ENABLE_XHS: ${{ secrets.ENABLE_XHS }}
      XHS_MCP_URL: ${{ secrets.XHS_MCP_URL }}
      XHS_KEYWORDS: ${{ secrets.XHS_KEYWORDS }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Crawl job sources
        run: npx tsx scripts/jobs_crawl.ts
      - name: Process job posts
        run: npx tsx scripts/jobs_process.ts

