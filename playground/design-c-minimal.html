<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Radar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
--accent:#0066FF;--accent-light:#E8F0FE;--bg:#FAFAFA;--white:#FFF;
--g50:#F8F9FA;--g100:#F1F3F5;--g200:#E9ECEF;--g300:#DEE2E6;--g400:#ADB5BD;
--g500:#868E96;--g600:#6C757D;--g700:#495057;--g800:#343A40;--g900:#212529;
--r:16px;--rp:100px;
--sh-s:0 1px 3px rgba(0,0,0,.04),0 1px 2px rgba(0,0,0,.06);
--sh-m:0 4px 12px rgba(0,0,0,.06),0 2px 6px rgba(0,0,0,.04);
--sh-l:0 12px 40px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.04);
--sans:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;
--serif:'Instrument Serif',Georgia,serif;
--ease:.25s cubic-bezier(.4,0,.2,1);
--c-model:#0066FF;--c-product:#7C3AED;--c-paper:#059669;--c-industry:#D97706;
--c-funding:#DC2626;--c-policy:#6366F1;--c-opensource:#0891B2;--c-opinion:#DB2777
}
body{font-family:var(--sans);background:var(--bg);color:var(--g900);line-height:1.6;-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}
.nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.82);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--g200)}
.nav-inner{max-width:1280px;margin:0 auto;padding:0 32px;height:64px;display:flex;align-items:center;justify-content:space-between}
.wordmark{font-family:var(--serif);font-size:26px;letter-spacing:-.5px}
.wordmark em{color:var(--accent);font-style:normal}
.nav-r{display:flex;align-items:center;gap:28px}
.nav-r a{font-size:14px;font-weight:500;color:var(--g600);transition:color var(--ease)}
.nav-r a:hover{color:var(--g900)}
.nav-date{font-size:13px;color:var(--g400)}
.hero{max-width:1280px;margin:0 auto;padding:48px 32px 0}
.hero h1{font-family:var(--serif);font-size:44px;font-weight:400;letter-spacing:-1px;line-height:1.15;margin-bottom:10px}
.hero p{font-size:16px;color:var(--g500);max-width:520px}
.stats-sec{max-width:1280px;margin:0 auto;padding:36px 32px 0}
.stats-row{display:flex;gap:16px}
.stat{flex:1;background:var(--white);border:1px solid var(--g200);border-radius:var(--r);padding:24px 28px;text-align:center;transition:box-shadow var(--ease),transform var(--ease)}
.stat:hover{box-shadow:var(--sh-m);transform:translateY(-2px)}
.stat-n{font-size:36px;font-weight:700;color:var(--accent);line-height:1.1;letter-spacing:-1px}
.stat-n span{font-size:18px;font-weight:500;color:var(--g400);margin-left:2px}
.stat-l{font-size:13px;color:var(--g500);margin-top:6px;font-weight:500}
.filters{max-width:1280px;margin:0 auto;padding:32px 32px 0}
.filters-bar{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.search-box{position:relative;flex-shrink:0}
.search-box svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--g400);pointer-events:none}
.search-box input{width:240px;height:42px;border:1px solid var(--g200);border-radius:var(--rp);padding:0 16px 0 40px;font-size:14px;font-family:var(--sans);background:var(--white);outline:none;transition:border-color var(--ease),box-shadow var(--ease)}
.search-box input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,102,255,.1)}
.search-box input::placeholder{color:var(--g400)}
.pills{display:flex;gap:8px;flex-wrap:wrap;flex:1}
.pill{height:36px;padding:0 16px;border:1px solid var(--g200);border-radius:var(--rp);background:var(--white);font-size:13px;font-family:var(--sans);font-weight:500;color:var(--g600);cursor:pointer;transition:all var(--ease);white-space:nowrap;display:inline-flex;align-items:center;gap:4px}
.pill:hover{border-color:var(--accent);color:var(--accent)}
.pill.active{background:var(--accent);border-color:var(--accent);color:#fff}
.source-sel{position:relative;flex-shrink:0}
.source-sel select{height:42px;padding:0 36px 0 16px;border:1px solid var(--g200);border-radius:var(--rp);background:var(--white);font-size:13px;font-family:var(--sans);font-weight:500;color:var(--g700);appearance:none;cursor:pointer;outline:none;transition:border-color var(--ease)}
.source-sel select:focus{border-color:var(--accent)}
.source-sel svg{position:absolute;right:14px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--g400)}
.grid-wrap{max-width:1280px;margin:0 auto;padding:32px 32px 64px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px}
.card{background:var(--white);border:1px solid var(--g200);border-radius:var(--r);overflow:hidden;transition:transform var(--ease),box-shadow var(--ease);cursor:default;position:relative}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--r) var(--r) 0 0}
.card:hover{transform:translateY(-4px);box-shadow:var(--sh-l)}
.card-body{padding:24px 28px 20px}
.card-top{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.cat-pill{font-size:12px;font-weight:600;padding:4px 12px;border-radius:var(--rp);line-height:1.4}
.card-source{font-size:12px;color:var(--g400);font-weight:500;margin-left:auto}
.card-title{font-family:var(--serif);font-size:22px;line-height:1.35;margin-bottom:10px;letter-spacing:-.3px;color:var(--g900)}
.card-summary{font-size:14px;color:var(--g600);line-height:1.7;margin-bottom:14px}
.card-quote{border-left:3px solid var(--accent);padding:10px 16px;margin-bottom:16px;background:var(--g50);border-radius:0 var(--r) var(--r) 0;font-size:13px;color:var(--g700);line-height:1.7;font-style:italic}
.card-tags{display:flex;flex-wrap:wrap;gap:6px}
.tag{font-size:11px;padding:3px 10px;border-radius:var(--rp);background:var(--g100);color:var(--g500);font-weight:500;transition:background var(--ease)}
.tag:hover{background:var(--g200)}
.card.hide{display:none}
.card.fade-in{animation:fadeUp .4s var(--ease) both}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.foot{max-width:1280px;margin:0 auto;padding:0 32px 48px;text-align:center;font-size:13px;color:var(--g400);border-top:1px solid var(--g200);padding-top:32px}
.foot span{color:var(--accent);font-weight:600}
@media(max-width:860px){
.grid{grid-template-columns:1fr}
.stats-row{flex-wrap:wrap}.stat{min-width:calc(50% - 8px)}
.hero h1{font-size:32px}
.filters-bar{flex-direction:column;align-items:stretch}
.search-box input{width:100%}
.pills{justify-content:flex-start}
.nav-r a:not(:last-child){display:none}
}
@media(max-width:480px){
.nav-inner,.hero,.stats-sec,.filters,.grid-wrap,.foot{padding-left:16px;padding-right:16px}
.stat{min-width:100%}
.card-body{padding:18px 20px 16px}
.card-title{font-size:19px}
}
</style>
</head>
<body>
<nav class="nav"><div class="nav-inner">
<a href="#" class="wordmark">AI <em>Radar</em></a>
<div class="nav-r"><a href="#">今日速览</a><a href="#">深度分析</a><a href="#">数据源</a><span class="nav-date" id="navDate"></span></div>
</div></nav>
<section class="hero"><h1>今日 AI 资讯速览</h1><p>聚合全球 26 个高质量信息源，每日精选最值得关注的 AI 动态</p></section>
<section class="stats-sec"><div class="stats-row">
<div class="stat"><div class="stat-n">26</div><div class="stat-l">信息源</div></div>
<div class="stat"><div class="stat-n">10</div><div class="stat-l">今日精选</div></div>
<div class="stat"><div class="stat-n">8</div><div class="stat-l">分类领域</div></div>
<div class="stat"><div class="stat-n">3<span>min</span></div><div class="stat-l">阅读时长</div></div>
</div></section>
<section class="filters"><div class="filters-bar">
<div class="search-box">
<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
<input type="text" placeholder="搜索资讯..." id="searchInput">
</div>
<div class="pills" id="pills">
<button class="pill active" data-cat="all">全部</button>
<button class="pill" data-cat="model">🚀 模型发布</button>
<button class="pill" data-cat="product">🛠️ 产品工具</button>
<button class="pill" data-cat="paper">📄 研究论文</button>
<button class="pill" data-cat="industry">📡 行业动态</button>
<button class="pill" data-cat="funding">💰 融资并购</button>
<button class="pill" data-cat="policy">⚖️ 政策监管</button>
<button class="pill" data-cat="opensource">🔧 开源项目</button>
<button class="pill" data-cat="opinion">💡 观点洞察</button>
</div>
<div class="source-sel">
<select id="sourceFilter">
<option value="all">所有来源</option>
<option value="official">官方博客</option>
<option value="community">社区平台</option>
<option value="individual">个人博主</option>
<option value="media">科技媒体</option>
</select>
<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
</div>
</div></section>
<section class="grid-wrap"><div class="grid" id="grid"></div></section>
<footer class="foot">AI <span>Radar</span> — 为中国 AI 从业者打造的全球资讯聚合平台 &copy; 2026</footer>
<script>
const CATS={model:{label:'🚀 模型发布',color:'var(--c-model)',bg:'#E8F0FE'},product:{label:'🛠️ 产品工具',color:'var(--c-product)',bg:'#F3E8FF'},paper:{label:'📄 研究论文',color:'var(--c-paper)',bg:'#ECFDF5'},industry:{label:'📡 行业动态',color:'var(--c-industry)',bg:'#FEF3C7'},funding:{label:'💰 融资并购',color:'var(--c-funding)',bg:'#FEE2E2'},policy:{label:'⚖️ 政策监管',color:'var(--c-policy)',bg:'#EEF2FF'},opensource:{label:'🔧 开源项目',color:'var(--c-opensource)',bg:'#ECFEFF'},opinion:{label:'💡 观点洞察',color:'var(--c-opinion)',bg:'#FDF2F8'}};

const ARTICLES=[
{cat:'model',source:'OpenAI Blog',sourceType:'official',importance:95,title:'OpenAI 发布 GPT-5：多模态推理能力实现质的飞跃',summary:'GPT-5 在数学推理、代码生成和多模态理解方面均大幅超越前代模型，支持原生图像和音频输入输出，推理速度提升 3 倍。',why:'GPT-5 的发布将重新定义 AI 能力边界，对所有基于 LLM 的产品和服务产生深远影响，开发者需要重新评估技术选型。',tags:['GPT-5','多模态','推理']},
{cat:'product',source:'Anthropic',sourceType:'official',importance:90,title:'Claude 推出 Artifacts 协作功能，支持团队实时共享 AI 生成内容',summary:'Anthropic 为 Claude 新增团队协作层，允许多人实时查看、编辑和迭代 AI 生成的代码、文档和可视化内容。',why:'这标志着 AI 助手从个人工具向团队协作平台的转变，将直接影响企业级 AI 产品的设计思路。',tags:['Claude','协作','企业级']},
{cat:'paper',source:'arXiv',sourceType:'community',importance:88,title:'DeepMind 新论文：通过自我博弈实现 LLM 持续自我改进',summary:'研究团队提出 SPIN 框架，让语言模型通过与自身早期版本对弈来持续提升能力，无需额外人类标注数据。',why:'如果自我改进方法被验证有效，将大幅降低模型训练对人类标注数据的依赖，改变整个训练范式。',tags:['自我改进','SPIN','训练范式']},
{cat:'industry',source:'TechCrunch AI',sourceType:'media',importance:85,title:'苹果与百度达成合作，Apple Intelligence 将深度整合文心大模型',summary:'苹果宣布在中国市场的 Apple Intelligence 功能将由百度文心大模型驱动，覆盖 Siri、写作工具和图像生成。',why:'这一合作将影响数亿中国 iPhone 用户的 AI 体验，同时为百度带来巨大的分发渠道优势。',tags:['苹果','百度','Apple Intelligence']},
{cat:'funding',source:'VentureBeat AI',sourceType:'media',importance:82,title:'月之暗面完成 10 亿美元融资，估值突破 100 亿美元',summary:'Moonshot AI（月之暗面）宣布完成新一轮融资，由阿里巴巴领投，老股东红杉中国跟投，将用于多模态大模型研发。',why:'中国 AI 独角兽的融资规模持续攀升，反映出资本市场对国产大模型的信心，竞争格局正在加速分化。',tags:['月之暗面','融资','大模型']},
{cat:'opensource',source:'GitHub Trending',sourceType:'community',importance:80,title:'Llama 4 Scout 开源发布：Meta 最强开源模型支持百万级上下文',summary:'Meta 正式开源 Llama 4 Scout，支持 1000 万 token 上下文窗口，在多项基准测试中超越同级别闭源模型。',why:'超长上下文开源模型的出现将催生全新的应用场景，如整本书分析、大型代码库理解等，开源生态再次缩小与闭源的差距。',tags:['Llama 4','开源','长上下文']},
{cat:'policy',source:'MIT Tech Review',sourceType:'media',importance:78,title:'欧盟 AI 法案正式生效：高风险 AI 系统面临严格合规要求',summary:'欧盟《人工智能法案》核心条款正式实施，要求高风险 AI 系统必须通过合规评估，违规企业最高面临全球营收 7% 的罚款。',why:'这是全球首部全面的 AI 监管法律，将成为其他国家和地区立法的参考模板，出海企业必须提前做好合规准备。',tags:['欧盟','AI法案','合规']},
{cat:'opinion',source:'Andrej Karpathy',sourceType:'individual',importance:75,title:'Karpathy：AI 编程的未来不是 Copilot，而是 AI 原生开发环境',summary:'Karpathy 在最新博文中指出，当前的 AI 编程辅助工具只是过渡形态，未来的开发环境将以 AI 为核心重新设计。',why:'作为前 Tesla AI 总监和 OpenAI 联合创始人，Karpathy 的观点往往预示行业趋势，值得开发者和工具创业者深思。',tags:['AI编程','开发工具','趋势']},
{cat:'model',source:'Google DeepMind',sourceType:'official',importance:86,title:'Gemini 2.5 Pro 登顶编程排行榜，代码生成能力全面领先',summary:'Google 发布 Gemini 2.5 Pro，在 SWE-bench、HumanEval 等编程基准测试中取得最高分，支持 100 万 token 上下文。',why:'编程能力的突破意味着 AI 辅助开发将进入新阶段，开发者工具市场将迎来新一轮洗牌。',tags:['Gemini','编程','基准测试']},
{cat:'product',source:'Hacker News',sourceType:'community',importance:72,title:'Cursor 推出 Background Agent：后台自主完成复杂编程任务',summary:'AI 代码编辑器 Cursor 发布后台代理功能，可在云端独立运行，自主完成代码重构、测试编写等复杂任务。',why:'后台 AI 代理的出现正在模糊"工具"和"同事"的边界，软件开发的协作模式可能发生根本性变化。',tags:['Cursor','AI代理','开发工具']}
];

// Date
const d=new Date();
document.getElementById('navDate').textContent=d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日';

// Render cards
const grid=document.getElementById('grid');
function renderCards(list){
  grid.innerHTML='';
  list.forEach((a,i)=>{
    const c=CATS[a.cat];
    const card=document.createElement('div');
    card.className='card fade-in';
    card.dataset.cat=a.cat;
    card.dataset.source=a.sourceType;
    card.style.animationDelay=i*60+'ms';
    card.style.setProperty('--bar-color',c.color);
    card.innerHTML=`<div style="position:absolute;top:0;left:0;right:0;height:3px;background:${c.color};opacity:${Math.min(a.importance/100,1)};border-radius:var(--r) var(--r) 0 0"></div>
<div class="card-body">
<div class="card-top"><span class="cat-pill" style="background:${c.bg};color:${c.color}">${c.label}</span><span class="card-source">${a.source}</span></div>
<div class="card-title">${a.title}</div>
<div class="card-summary">${a.summary}</div>
<div class="card-quote">${a.why}</div>
<div class="card-tags">${a.tags.map(t=>'<span class="tag">'+t+'</span>').join('')}</div>
</div>`;
    grid.appendChild(card);
  });
}
renderCards(ARTICLES);

// Filters
let activeCat='all',activeSource='all',searchTerm='';
function applyFilters(){
  const filtered=ARTICLES.filter(a=>{
    if(activeCat!=='all'&&a.cat!==activeCat)return false;
    if(activeSource!=='all'&&a.sourceType!==activeSource)return false;
    if(searchTerm&&!a.title.includes(searchTerm)&&!a.summary.includes(searchTerm)&&!a.tags.some(t=>t.includes(searchTerm)))return false;
    return true;
  });
  renderCards(filtered);
}
document.getElementById('pills').addEventListener('click',e=>{
  const btn=e.target.closest('.pill');
  if(!btn)return;
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  activeCat=btn.dataset.cat;
  applyFilters();
});
document.getElementById('sourceFilter').addEventListener('change',e=>{
  activeSource=e.target.value;
  applyFilters();
});
document.getElementById('searchInput').addEventListener('input',e=>{
  searchTerm=e.target.value.trim();
  applyFilters();
});
</script>
</body>
</html>
