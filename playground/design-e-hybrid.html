<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Radar — Neon Terminal Hybrid</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0e17;--bg-s:rgba(15,20,35,.85);--bg-g:rgba(20,28,50,.55);
  --cy:#00F5FF;--pk:#FF006E;--gn:#4ade80;--am:#fbbf24;
  --tx:#e2e8f0;--td:#64748b;--tm:#475569;
  --bd:rgba(0,245,255,.12);
  --gc:0 0 12px rgba(0,245,255,.4);--gp:0 0 12px rgba(255,0,110,.4);
  --gg:0 0 10px rgba(74,222,128,.35);--ga:0 0 10px rgba(251,191,36,.35);
  --fm:'JetBrains Mono',monospace;--fb:'Exo 2',sans-serif;
}
html{font-size:15px}
body{background:var(--bg);color:var(--tx);font-family:var(--fb);line-height:1.6;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,245,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,255,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,245,255,.015) 2px,rgba(0,245,255,.015) 4px);pointer-events:none;z-index:9999}
.wrap{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:0 16px 60px}
/* NAV */
.nav{padding:24px 0 16px;border-bottom:1px solid var(--bd)}
.nav-title{font-family:var(--fm);font-size:1.6rem;font-weight:700;color:var(--cy);text-shadow:0 0 20px rgba(0,245,255,.5),0 0 40px rgba(0,245,255,.2);letter-spacing:3px;margin-bottom:6px}
.nav-prompt{font-family:var(--fm);font-size:.8rem;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.nav-prompt .dollar{color:var(--gn);text-shadow:var(--gg)}
.nav-prompt .cmd{color:var(--cy);text-shadow:var(--gc);font-weight:700}
.nav-prompt .flags{color:var(--td)}
.cursor{display:inline-block;width:8px;height:16px;background:var(--cy);box-shadow:var(--gc);animation:blink 1s step-end infinite;vertical-align:middle;margin-left:2px}
@keyframes blink{50%{opacity:0}}
/* STATS */
.stats{display:flex;align-items:center;margin:16px 0;padding:10px 16px;background:var(--bg-g);backdrop-filter:blur(12px);border:1px solid var(--bd);border-radius:6px;overflow-x:auto}
.st{display:flex;align-items:baseline;gap:6px;padding:0 16px;white-space:nowrap;font-family:var(--fm);font-size:.78rem}
.st:first-child{padding-left:0}
.st+.st{border-left:1px solid rgba(0,245,255,.15)}
.st .l{color:var(--td)}.st .v{font-weight:700;font-size:1.05rem}
.v.cy{color:var(--cy);text-shadow:var(--gc)}
.v.pk{color:var(--pk);text-shadow:var(--gp)}
.v.gn{color:var(--gn);text-shadow:var(--gg)}
.v.am{color:var(--am);text-shadow:var(--ga)}
/* FILTERS */
.filters{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0 12px;align-items:center}
.fp{font-family:var(--fm);font-size:.72rem;color:var(--tm);margin-right:2px}
.pill{font-family:var(--fm);font-size:.72rem;padding:4px 12px;border:1px solid rgba(0,245,255,.25);border-radius:20px;background:rgba(0,245,255,.05);color:var(--td);cursor:pointer;transition:all .2s;user-select:none;white-space:nowrap}
.pill:hover{border-color:var(--cy);color:var(--cy);background:rgba(0,245,255,.1);box-shadow:var(--gc)}
.pill.on{border-color:var(--cy);color:var(--cy);background:rgba(0,245,255,.12);box-shadow:0 0 8px rgba(0,245,255,.3)}
/* CATS */
.cats{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.cat{font-family:var(--fb);font-size:.72rem;padding:3px 10px;border:1px solid var(--bd);border-radius:14px;background:transparent;color:var(--td);cursor:pointer;transition:all .2s;white-space:nowrap}
.cat:hover,.cat.on{border-color:var(--cy);color:var(--cy);background:rgba(0,245,255,.08)}
/* ARTICLE LIST */
.alist{display:flex;flex-direction:column;gap:0}
.arow{border-bottom:1px solid rgba(0,245,255,.06);transition:background .15s}
.arow:hover{background:rgba(0,245,255,.03)}
.ahdr{display:grid;grid-template-columns:30px 40px 1fr auto auto auto;align-items:center;gap:8px;padding:10px 8px;cursor:pointer;user-select:none}
.arank{font-family:var(--fm);font-size:.85rem;font-weight:700;color:var(--cy);text-shadow:var(--gc);text-align:right}
.ascore-wrap{display:flex;flex-direction:column;align-items:center;gap:2px}
.ascore-bar{width:32px;height:4px;border-radius:2px;background:rgba(255,255,255,.08);overflow:hidden}
.ascore-fill{height:100%;border-radius:2px;transition:width .3s}
.ascore-num{font-family:var(--fm);font-size:.65rem;font-weight:700}
.sc-hot{color:var(--pk);text-shadow:var(--gp)}
.sc-hot .ascore-fill{background:var(--pk);box-shadow:var(--gp)}
.sc-high{color:var(--cy);text-shadow:var(--gc)}
.sc-high .ascore-fill{background:var(--cy);box-shadow:var(--gc)}
.sc-mid{color:var(--td)}
.sc-mid .ascore-fill{background:var(--td)}
.sc-low{color:var(--tm)}
.sc-low .ascore-fill{background:var(--tm)}
.atitle{font-family:var(--fb);font-size:.92rem;font-weight:500;color:var(--tx);transition:color .15s;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.arow:hover .atitle{color:#fff}
.abadge{font-family:var(--fm);font-size:.6rem;padding:2px 8px;border-radius:10px;backdrop-filter:blur(6px);white-space:nowrap;font-weight:500;letter-spacing:.3px}
.b-official{background:rgba(0,245,255,.1);color:var(--cy);border:1px solid rgba(0,245,255,.3);box-shadow:0 0 6px rgba(0,245,255,.15)}
.b-community{background:rgba(255,0,110,.1);color:var(--pk);border:1px solid rgba(255,0,110,.3);box-shadow:0 0 6px rgba(255,0,110,.15)}
.b-person{background:rgba(251,191,36,.1);color:var(--am);border:1px solid rgba(251,191,36,.3);box-shadow:0 0 6px rgba(251,191,36,.15)}
.b-media{background:rgba(74,222,128,.1);color:var(--gn);border:1px solid rgba(74,222,128,.3);box-shadow:0 0 6px rgba(74,222,128,.15)}
.acat{font-family:var(--fb);font-size:.62rem;padding:2px 8px;border:1px solid rgba(0,245,255,.2);border-radius:10px;color:var(--td);white-space:nowrap}
.atime{font-family:var(--fm);font-size:.68rem;color:var(--tm);white-space:nowrap;min-width:44px;text-align:right}
/* EXPAND */
.aexpand{max-height:0;overflow:hidden;transition:max-height .35s cubic-bezier(.4,0,.2,1),opacity .25s;opacity:0}
.arow.open .aexpand{max-height:500px;opacity:1}
.aexpand-inner{padding:6px 8px 14px 80px}
.asummary{font-size:.82rem;color:var(--td);line-height:1.7;margin-bottom:10px}
.awhy{border-left:2px solid var(--pk);padding:8px 12px;margin-bottom:10px;background:rgba(255,0,110,.04);border-radius:0 4px 4px 0}
.awhy-label{font-family:var(--fm);font-size:.68rem;color:var(--pk);text-shadow:var(--gp);margin-bottom:4px;font-weight:700}
.awhy-text{font-size:.8rem;color:var(--tx);line-height:1.6}
.atags{display:flex;flex-wrap:wrap;gap:5px}
.atag{font-family:var(--fm);font-size:.6rem;padding:2px 8px;border-radius:8px;background:rgba(0,245,255,.06);color:var(--cy);border:1px solid rgba(0,245,255,.15)}
@media(max-width:700px){
  .ahdr{grid-template-columns:24px 36px 1fr auto;gap:6px;padding:8px 4px}
  .acat,.atime{display:none}
  .aexpand-inner{padding:6px 4px 14px 60px}
  .stats{flex-wrap:wrap;gap:8px}
  .st{padding:4px 10px;border-left:none!important}
  .nav-title{font-size:1.3rem}
}
</style>
</head>
<body>
<div class="wrap" id="app"></div>

const DATA=[
{id:1,rank:1,score:9.5,title:'OpenAI 发布 GPT-5：多模态推理能力实现质的飞跃',source:'OpenAI',stype:'official',cat:'🚀模型发布',time:'2小时前',

summary:'Google DeepMind 开源 Gemma 3 系列模型，最大 27B 版本可在单张 RTX 4090 上运行，性能接近 Gemini 1.5 Pro，支持 128K 上下文窗口。',

{id:8,rank:8,score:7.2,title:'xAI 完成 60 亿美元融资，估值达 240 亿美元',source:'VentureBeat AI',stype:'media',cat:'💰融资并购',time:'14小时前',
summary:'马斯克旗下 xAI 完成新一轮 60 亿美元融资，由 a16z 和红杉资本领投，资金将用于扩建 Memphis 超算中心和 Grok 3 模型训练。',

tags:['强化学习','自我纠错','arXiv','推理']},
{id:10,rank:10,score:6.3,title:'NVIDIA 发布 NIM 微服务平台：企业级 AI 部署开箱即用',source:'NVIDIA',stype:'official',cat:'🛠️产品工具',time:'18小时前',
summary:'NVIDIA 推出 NIM（NVIDIA Inference Microservices）平台，提供预优化的 AI 模型容器化部署方案，支持一键部署到任何云环境或本地服务器。',
why:'企业级 AI 部署工具的成熟将加速 AI 应用落地，降低从原型到生产的技术门槛，对技术团队的架构选型有直接影响。',
tags:['NVIDIA','NIM','部署','企业级']}
];

let activeCat='全部';
let activeFilters=new Set(['--sort=importance']);

function scoreClass(s){if(s>=9)return'sc-hot';if(s>=7)return'sc-high';if(s>=5)return'sc-mid';return'sc-low'}
function badgeClass(t){return'b-'+t}

function render(){
const app=document.getElementById('app');
const hotCount=DATA.filter(d=>d.score>=9).length;
const avgScore=(DATA.reduce((a,d)=>a+d.score,0)/DATA.length).toFixed(1);
const srcCount=new Set(DATA.map(d=>d.source)).size;

let html=`
<nav class="nav">
  <div class="nav-title">AI RADAR</div>
  <div class="nav-prompt">
    <span class="dollar">$</span>
    <span class="cmd">ai-radar</span>
    <span class="flags">--scan --date=2025-03-19 --mode=live</span>
    <span class="cursor"></span>
  </div>
</nav>

<div class="stats">
  <div class="st"><span class="l">今日资讯</span><span class="v cy">${DATA.length}</span></div>
  <div class="st"><span class="l">高分热点</span><span class="v pk">${hotCount}</span></div>
  <div class="st"><span class="l">平均分</span><span class="v am">${avgScore}</span></div>
  <div class="st"><span class="l">信息源</span><span class="v gn">${srcCount}</span></div>
</div>

<div class="filters">
  <span class="fp">flags:</span>
  ${FILTERS.map(f=>`<span class="pill${activeFilters.has(f.label)?' on':''}" data-filter="${f.label}">${f.label}</span>`).join('')}
</div>

<div class="cats">
  ${CATS.map(c=>`<span class="cat${activeCat===c?' on':''}" data-cat="${c}">${c}</span>`).join('')}
</div>

<div class="alist">`;

const filtered=activeCat==='全部'?DATA:DATA.filter(d=>d.cat===activeCat);

filtered.forEach((d,i)=>{
const sc=scoreClass(d.score);
html+=`
  <div class="arow" data-id="${d.id}">
    <div class="ahdr">
      <div class="arank">${String(i+1).padStart(2,'0')}</div>
      <div class="ascore-wrap ${sc}">
        <div class="ascore-bar"><div class="ascore-fill" style="width:${d.score*10}%"></div></div>
        <div class="ascore-num">${d.score}</div>
      </div>
      <div class="atitle">${d.title}</div>
      <div class="abadge ${badgeClass(d.stype)}">${d.source}</div>
      <div class="acat">${d.cat}</div>
      <div class="atime">${d.time}</div>
    </div>
    <div class="aexpand">
      <div class="aexpand-inner">
        <div class="asummary">${d.summary}</div>
        <div class="awhy">
          <div class="awhy-label">// 为什么重要</div>
          <div class="awhy-text">${d.why}</div>
        </div>
        <div class="atags">${d.tags.map(t=>`<span class="atag">${t}</span>`).join('')}</div>
      </div>
    </div>
  </div>`;
});

html+=`</div>`;
app.innerHTML=html;
bindEvents();
}

function bindEvents(){
document.querySelectorAll('.ahdr').forEach(el=>{
  el.addEventListener('click',()=>{
    const row=el.closest('.arow');
    const wasOpen=row.classList.contains('open');
    document.querySelectorAll('.arow.open').forEach(r=>r.classList.remove('open'));
    if(!wasOpen)row.classList.add('open');
  });
});
document.querySelectorAll('.cat').forEach(el=>{
  el.addEventListener('click',()=>{
    activeCat=el.dataset.cat;
    render();
  });
});
document.querySelectorAll('.pill').forEach(el=>{
  el.addEventListener('click',()=>{
    const f=el.dataset.filter;
    if(activeFilters.has(f))activeFilters.delete(f);else activeFilters.add(f);
    render();
  });
});
}

render();
</script>
</body>
</html>
