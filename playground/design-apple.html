<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Radar — Apple News</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#000000;--surface:#1C1C1E;--surface-2:#2C2C2E;
  --accent:#0A84FF;--red:#FF453A;--orange:#FF9F0A;--green:#30D158;--purple:#BF5AF2;
  --text-primary:#FFFFFF;--text-secondary:#98989D;--text-tertiary:#636366;
  --font-heading:'Plus Jakarta Sans',system-ui,-apple-system,sans-serif;
  --font-body:'Source Sans 3',system-ui,-apple-system,sans-serif;
}
html{font-size:16px;scroll-behavior:smooth}
body{
  background:var(--bg);color:var(--text-primary);font-family:var(--font-body);
  line-height:1.6;min-height:100vh;-webkit-font-smoothing:antialiased;
}
::selection{background:var(--accent);color:var(--bg)}
::-webkit-scrollbar{width:10px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--surface-2);border-radius:5px}
::-webkit-scrollbar-thumb:hover{background:var(--text-tertiary)}

/* ── Container ── */
.container{max-width:1200px;margin:0 auto;padding:2rem 1.5rem}

/* ── Header ── */
.header{margin-bottom:2.5rem;text-align:center}
.header-title{
  font-family:var(--font-heading);font-size:2.5rem;font-weight:800;
  letter-spacing:-0.03em;margin-bottom:0.5rem;
}
.header-subtitle{
  font-size:1rem;color:var(--text-secondary);font-weight:500;
}

/* ── Stats Toggle ── */
.stats-toggle{
  background:var(--surface);border-radius:12px;padding:1rem 1.5rem;
  margin-bottom:2rem;cursor:pointer;user-select:none;
  display:flex;justify-content:space-between;align-items:center;
  transition:background 0.2s;
}
.stats-toggle:hover{background:var(--surface-2)}
.stats-toggle-label{font-weight:600;font-size:0.95rem}
.stats-toggle-icon{
  color:var(--text-secondary);transition:transform 0.3s;
}
.stats-toggle.open .stats-toggle-icon{transform:rotate(180deg)}
.stats-content{
  display:none;margin-bottom:2rem;
}
.stats-toggle.open + .stats-content{display:block}
.stats-grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;
}
.stat-card{
  background:var(--surface);border-radius:12px;padding:1.25rem;
}
.stat-label{
  font-size:0.8rem;color:var(--text-secondary);text-transform:uppercase;
  letter-spacing:0.5px;margin-bottom:0.5rem;font-weight:600;
}
.stat-value{
  font-size:2rem;font-weight:700;color:var(--text-primary);
  font-family:var(--font-heading);
}
.stat-sub{font-size:0.85rem;color:var(--text-tertiary);margin-top:0.25rem}

/* ── Filters ── */
.filters{margin-bottom:2rem}
.filter-section{margin-bottom:1.5rem}
.filter-label{
  font-size:0.85rem;color:var(--text-secondary);text-transform:uppercase;
  letter-spacing:0.5px;margin-bottom:0.75rem;font-weight:600;
}
.filter-pills{display:flex;flex-wrap:wrap;gap:0.5rem}
.filter-pill{
  background:var(--surface);border:none;color:var(--text-primary);
  padding:0.5rem 1rem;border-radius:20px;font-family:var(--font-body);
  font-size:0.9rem;cursor:pointer;transition:all 0.2s;
  font-weight:500;
}
.filter-pill:hover{background:var(--surface-2)}
.filter-pill.active{background:var(--accent);color:var(--text-primary)}

/* ── Hero Card ── */
.hero-card{
  background:var(--surface);border-radius:16px;padding:2rem;
  margin-bottom:2rem;cursor:pointer;
  transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.3s;
}
.hero-card:hover{
  transform:translateY(-4px);
  box-shadow:0 20px 40px rgba(0,0,0,0.4);
}
.hero-meta{display:flex;align-items:center;gap:0.75rem;margin-bottom:1rem}
.hero-category{
  font-size:0.75rem;font-weight:700;text-transform:uppercase;
  letter-spacing:0.5px;color:var(--red);
}
.hero-source{font-size:0.85rem;color:var(--text-secondary)}
.hero-score{
  background:var(--surface-2);color:var(--text-primary);
  padding:0.25rem 0.75rem;border-radius:12px;font-size:0.8rem;
  font-weight:600;margin-left:auto;
}
.hero-title{
  font-family:var(--font-heading);font-size:2rem;font-weight:700;
  line-height:1.3;margin-bottom:1rem;letter-spacing:-0.02em;
}
.hero-summary{
  font-size:1.05rem;color:var(--text-secondary);line-height:1.6;
  margin-bottom:1rem;
}
.hero-detail{
  display:none;border-left:3px solid var(--accent);
  padding-left:1.25rem;margin-top:1.5rem;
}
.hero-card.expanded .hero-detail{display:block}
.detail-why{
  font-size:1rem;color:var(--text-primary);line-height:1.7;
  margin-bottom:1rem;
}
.detail-tags{display:flex;flex-wrap:wrap;gap:0.5rem}
.detail-tag{
  font-size:0.8rem;color:var(--text-tertiary);
  background:var(--surface-2);padding:0.25rem 0.75rem;
  border-radius:8px;
}

/* ── Grid Cards ── */
.grid{
  display:grid;grid-template-columns:repeat(2,1fr);gap:1.5rem;
  margin-bottom:2rem;
}
.grid-card{
  background:var(--surface);border-radius:12px;padding:1.5rem;
  cursor:pointer;
  transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1),background 0.2s;
}
.grid-card:hover{
  transform:translateY(-2px);background:var(--surface-2);
}
.card-meta{display:flex;align-items:center;gap:0.5rem;margin-bottom:0.75rem}
.card-category{
  font-size:0.7rem;font-weight:700;text-transform:uppercase;
  letter-spacing:0.5px;
}
.cat-model{color:var(--red)}
.cat-product{color:var(--orange)}
.cat-research{color:var(--purple)}
.cat-opensource{color:var(--green)}
.cat-policy{color:var(--accent)}
.cat-insight{color:var(--purple)}
.cat-funding{color:var(--orange)}
.card-source{font-size:0.8rem;color:var(--text-secondary)}
.card-score{
  background:var(--surface-2);color:var(--text-primary);
  padding:0.2rem 0.6rem;border-radius:10px;font-size:0.75rem;
  font-weight:600;margin-left:auto;
}
.card-title{
  font-family:var(--font-heading);font-size:1.1rem;font-weight:600;
  line-height:1.4;margin-bottom:0.75rem;
}
.card-preview{
  font-size:0.95rem;color:var(--text-secondary);line-height:1.5;
  margin-bottom:0.75rem;display:-webkit-box;-webkit-line-clamp:2;
  -webkit-box-orient:vertical;overflow:hidden;
}
.card-footer{
  display:flex;align-items:center;gap:0.5rem;
  font-size:0.8rem;color:var(--text-tertiary);
}
.card-time{margin-left:auto}
.card-detail{
  display:none;border-left:3px solid var(--accent);
  padding-left:1rem;margin-top:1rem;
}
.grid-card.expanded .card-detail{display:block}
.card-detail-why{
  font-size:0.9rem;color:var(--text-primary);line-height:1.6;
  margin-bottom:0.75rem;
}
.card-detail-tags{display:flex;flex-wrap:wrap;gap:0.4rem}
.card-detail-tag{
  font-size:0.75rem;color:var(--text-tertiary);
  background:var(--surface-2);padding:0.2rem 0.6rem;
  border-radius:6px;
}

/* ── Footer ── */
.footer{
  text-align:center;padding:2rem 0;color:var(--text-tertiary);
  font-size:0.9rem;
}

/* ── Responsive ── */
@media(max-width:768px){
  html{font-size:14px}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .grid{grid-template-columns:1fr}
  .hero-title{font-size:1.5rem}
  .header-title{font-size:2rem}
}
</style>
</head>

// ── State ──
let activeSource = 'all';
let activeCat = 'all';

// ── Render ──
function renderArticles() {
  const filtered = articles.filter(a => {
    if (activeSource !== 'all' && a.sourceType !== activeSource) return false;
    if (activeCat !== 'all' && a.category !== activeCat) return false;
    return true;
  }).sort((a, b) => b.score - a.score);

  const hero = filtered[0];
  const grid = filtered.slice(1);

  // Hero
  const heroContainer = document.getElementById('heroContainer');
  if (hero) {
    heroContainer.innerHTML = `
      <div class="hero-card" data-id="0">
        <div class="hero-meta">
          <span class="hero-category">${hero.category}</span>
          <span class="hero-source">${hero.source}</span>
          <span class="hero-score">${hero.score}</span>
        </div>
        <div class="hero-title">${hero.title}</div>
        <div class="hero-summary">${hero.summary}</div>
        <div class="hero-detail">
          <div class="detail-why">${hero.why}</div>
          <div class="detail-tags">${hero.tags.map(t => `<span class="detail-tag">#${t}</span>`).join('')}</div>
        </div>
      </div>`;
    heroContainer.querySelector('.hero-card').addEventListener('click', function() {
      this.classList.toggle('expanded');
    });
  } else {
    heroContainer.innerHTML = '';
  }

  // Grid
  const gridContainer = document.getElementById('gridContainer');
  gridContainer.innerHTML = grid.map((a, i) => {
    const catClass = {
      '模型发布': 'cat-model',
      '产品工具': 'cat-product',
      '研究论文': 'cat-research',
      '开源项目': 'cat-opensource',
      '政策监管': 'cat-policy',
      '观点洞察': 'cat-insight',
      '融资并购': 'cat-funding'
    }[a.category] || 'cat-model';
    return `
      <div class="grid-card" data-id="${i + 1}">
        <div class="card-meta">
          <span class="card-category ${catClass}">${a.category}</span>
          <span class="card-source">${a.source}</span>
          <span class="card-score">${a.score}</span>
        </div>
        <div class="card-title">${a.title}</div>
        <div class="card-preview">${a.summary}</div>
        <div class="card-footer">
          <span>${a.time}</span>
        </div>
        <div class="card-detail">
          <div class="card-detail-why">${a.why}</div>
          <div class="card-detail-tags">${a.tags.map(t => `<span class="card-detail-tag">#${t}</span>`).join('')}</div>
        </div>
      </div>`;
  }).join('');
  gridContainer.querySelectorAll('.grid-card').forEach(card => {
    card.addEventListener('click', function() {
      this.classList.toggle('expanded');
    });
  });
}

// ── Filters ──
document.getElementById('sourceFilters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-pill');
  if (!btn) return;
  document.querySelectorAll('#sourceFilters .filter-pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeSource = btn.dataset.filter;
  renderArticles();
});

document.getElementById('categoryFilters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-pill');
  if (!btn) return;
  document.querySelectorAll('#categoryFilters .filter-pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeCat = btn.dataset.cat;
  renderArticles();
});

// ── Stats Toggle ──
document.getElementById('statsToggle').addEventListener('click', function() {
  this.classList.toggle('open');
});

// ── Init ──
renderArticles();
</script>
</body>
</html>
