<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI RADAR — 全球AI资讯聚合平台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
/* === RESET & TOKENS === */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #111111;
  --bg-surface: #161616;
  --bg-hover: #1a1a1a;
  --bg-active: #1e1e1e;
  --accent: #5E6AD2;
  --accent-hover: #6E7AE2;
  --accent-muted: rgba(94,106,210,0.12);
  --border: #222222;
  --border-hover: #333333;
  --text-primary: #F2F2F2;
  --text-secondary: #8A8F98;
  --text-tertiary: #5C5F66;
  --green: #4ADE80;
  --amber: #FBBF24;
  --red: #F87171;
  --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-heading: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
  --radius-sm: 6px;
  --radius-md: 8px;
  --radius-lg: 10px;
  --transition: 150ms ease;
}
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text-primary);
  min-height: 100vh;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
/* Subtle noise texture via SVG data URI */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-repeat: repeat;
  background-size: 256px 256px;
}

/* === NAV === */
nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(17,17,17,0.82);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  height: 48px;
}
.nav-inner {
  max-width: 1080px; margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between;
  height: 100%; padding: 0 24px;
}
.logo-group { display: flex; align-items: center; gap: 10px; }
.logo-icon {
  width: 20px; height: 20px; position: relative;
  border: 1.5px solid var(--accent);
  border-radius: 50%;
}
.logo-icon::before {
  content: '';
  position: absolute; top: 50%; left: 50%;
  width: 6px; height: 6px; margin: -3px 0 0 -3px;
  background: var(--accent);
  border-radius: 50%;
}
.logo-icon::after {
  content: '';
  position: absolute; top: 50%; left: 50%;
  width: 50%; height: 50%;
  transform-origin: 0% 0%;
  border-top: 1.5px solid var(--accent);
  animation: sweep 3s linear infinite;
}
@keyframes sweep { to { transform: rotate(360deg); } }
.logo-text {
  font-family: var(--font-heading);
  font-weight: 700; font-size: 13px;
  letter-spacing: 1.5px;
  color: var(--text-primary);
}
.nav-links { display: flex; gap: 4px; list-style: none; }
.nav-links a {
  font-size: 13px; font-weight: 500;
  color: var(--text-secondary);
  text-decoration: none;
  padding: 6px 12px;
  border-radius: var(--radius-sm);
  transition: color var(--transition), background var(--transition);
}
.nav-links a:hover { color: var(--text-primary); background: var(--bg-hover); }
.nav-links a.active { color: var(--text-primary); background: var(--bg-active); }
.nav-meta {
  font-size: 12px; color: var(--text-tertiary);
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.3px;
}

/* === CONTAINER === */
.container {
  position: relative; z-index: 2;
  max-width: 1080px; margin: 0 auto;
  padding: 24px 24px 48px;
}

/* === STATS BAR === */
.stats-bar {
  display: flex; gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  overflow: hidden;
  margin-bottom: 20px;
}
.stat-item {
  flex: 1;
  background: var(--bg-surface);
  padding: 16px 20px;
  display: flex; align-items: baseline; gap: 8px;
}
.stat-number {
  font-family: var(--font-heading);
  font-size: 22px; font-weight: 700;
  color: var(--text-primary);
  line-height: 1;
}
.stat-label {
  font-size: 12px; color: var(--text-tertiary);
  letter-spacing: 0.2px;
}

/* === FILTER BAR === */
.filter-bar {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 4px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.search-box { position: relative; flex: 0 0 240px; }
.search-box input {
  width: 100%;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 6px 10px 6px 32px;
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 13px;
  outline: none;
  transition: border-color var(--transition);
}
.search-box input::placeholder { color: var(--text-tertiary); }
.search-box input:focus { border-color: var(--accent); }
.search-box svg {
  position: absolute; left: 9px; top: 50%; transform: translateY(-50%);
  width: 14px; height: 14px; stroke: var(--text-tertiary); fill: none; stroke-width: 2;
}
.filter-pills { display: flex; flex-wrap: wrap; gap: 4px; flex: 1; }
.pill {
  font-family: var(--font-body);
  font-size: 12px; font-weight: 500;
  padding: 4px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all var(--transition);
  white-space: nowrap;
}
.pill:hover {
  border-color: var(--border-hover);
  color: var(--text-primary);
  background: var(--bg-hover);
}
.pill.active {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-muted);
}
/* Source filter & score slider */
.filter-row-2 {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 0;
}
.source-select {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 5px 10px;
  color: var(--text-secondary);
  font-family: var(--font-body);
  font-size: 12px;
  outline: none;
  cursor: pointer;
  transition: border-color var(--transition);
  -webkit-appearance: none;
  appearance: none;
  background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%235C5F66' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 10px center;
  padding-right: 28px;
}
.source-select:focus { border-color: var(--accent); }
.score-slider-group {
  display: flex; align-items: center; gap: 8px;
  margin-left: auto;
}
.score-slider-group label {
  font-size: 12px; color: var(--text-tertiary); white-space: nowrap;
}
.score-slider-group input[type="range"] {
  -webkit-appearance: none; appearance: none;
  width: 120px; height: 3px;
  background: var(--border);
  border-radius: 2px;
  outline: none;
}
.score-slider-group input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
  border: 2px solid var(--bg);
  box-shadow: 0 0 0 1px var(--accent);
}
.score-slider-group .score-val {
  font-size: 12px; font-weight: 600;
  color: var(--text-primary);
  font-variant-numeric: tabular-nums;
  min-width: 20px; text-align: right;
}

/* === LIST HEADER === */
.list-header {
  display: grid;
  grid-template-columns: 48px 1fr 100px 120px 72px;
  gap: 12px;
  align-items: center;
  padding: 8px 16px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border-bottom: 1px solid var(--border);
  margin-top: 8px;
}

/* === ISSUE ROW === */
.issue-row {
  display: grid;
  grid-template-columns: 48px 1fr 100px 120px 72px;
  gap: 12px;
  align-items: center;
  padding: 0 16px;
  height: 44px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background var(--transition);
  position: relative;
}
.issue-row:hover { background: var(--bg-hover); }
.issue-row.expanded { background: var(--bg-active); }
/* Score bar */
.issue-score {
  display: flex; align-items: center; gap: 6px;
}
.score-bar-track {
  width: 28px; height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.score-bar-fill {
  height: 100%;
  border-radius: 2px;
  background: var(--accent);
  transition: width 0.4s ease;
}
.score-bar-fill.high { background: var(--green); }
.score-bar-fill.mid { background: var(--amber); }
.score-bar-fill.low { background: var(--text-tertiary); }
.score-num {
  font-size: 12px; font-weight: 600;
  font-variant-numeric: tabular-nums;
  color: var(--text-secondary);
  min-width: 14px;
}

/* Title in row */
.issue-title {
  font-size: 13px; font-weight: 500;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: color var(--transition);
}
.issue-row:hover .issue-title { color: #fff; }

/* Category pill in row */
.issue-cat {
  font-size: 11px; font-weight: 500;
  padding: 2px 8px;
  border-radius: 12px;
  border: 1px solid var(--border);
  color: var(--text-secondary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  text-align: center;
  transition: all var(--transition);
}
.issue-cat[data-cat="model"] { border-color: rgba(94,106,210,0.4); color: var(--accent); }
.issue-cat[data-cat="product"] { border-color: rgba(168,130,255,0.4); color: #A882FF; }
.issue-cat[data-cat="paper"] { border-color: rgba(74,222,128,0.4); color: var(--green); }
.issue-cat[data-cat="industry"] { border-color: rgba(96,165,250,0.4); color: #60A5FA; }
.issue-cat[data-cat="funding"] { border-color: rgba(251,191,36,0.4); color: var(--amber); }
.issue-cat[data-cat="policy"] { border-color: rgba(248,113,113,0.4); color: var(--red); }
.issue-cat[data-cat="opensource"] { border-color: rgba(45,212,191,0.4); color: #2DD4BF; }
.issue-cat[data-cat="opinion"] { border-color: rgba(244,114,182,0.4); color: #F472B6; }

/* Source & time */
.issue-source {
  font-size: 12px; color: var(--text-tertiary);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.issue-time {
  font-size: 12px; color: var(--text-tertiary);
  text-align: right;
  font-variant-numeric: tabular-nums;
}

/* === EXPANDED DETAIL === */
.issue-detail {
  display: none;
  padding: 0 16px 16px 76px;
  background: var(--bg-active);
  border-bottom: 1px solid var(--border);
  animation: slideDown 200ms ease;
}
.issue-detail.show { display: block; }
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-4px); }
  to { opacity: 1; transform: translateY(0); }
}
.detail-summary {
  font-size: 13px; line-height: 1.7;
  color: var(--text-secondary);
  margin-bottom: 12px;
  max-width: 640px;
}
.detail-why {
  padding: 10px 14px;
  border-left: 2px solid var(--accent);
  background: var(--accent-muted);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  max-width: 640px;
}
.detail-why-label {
  font-size: 11px; font-weight: 600;
  color: var(--accent);
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.detail-why p {
  font-size: 13px; line-height: 1.6;
  color: var(--text-primary);
}

/* === FOOTER === */
footer {
  position: relative; z-index: 2;
  text-align: center;
  padding: 32px 24px 24px;
  color: var(--text-tertiary);
  font-size: 12px;
  border-top: 1px solid var(--border);
  max-width: 1080px;
  margin: 0 auto;
}

/* === RESPONSIVE === */
@media (max-width: 768px) {
  .stats-bar { flex-direction: column; }
  .nav-links { display: none; }
  .filter-bar { flex-direction: column; align-items: stretch; }
  .search-box { flex: 1 1 100%; }
  .filter-pills { justify-content: flex-start; overflow-x: auto; flex-wrap: nowrap; }
  .filter-row-2 { flex-direction: column; align-items: stretch; }
  .score-slider-group { margin-left: 0; }
  .list-header { display: none; }
  .issue-row {
    grid-template-columns: 40px 1fr 72px;
    height: auto; padding: 10px 12px;
  }
  .issue-source, .issue-cat { display: none; }
  .issue-detail { padding-left: 52px; }
  .container { padding: 16px; }
}

/* === ENTRY ANIMATION === */
.issue-row {
  opacity: 0; transform: translateY(6px);
  animation: rowIn 0.3s ease forwards;
}
@keyframes rowIn {
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

// Populate source filter
const sources = [...new Set(articles.map(a => a.source))].sort();
const sourceSelect = document.getElementById('sourceFilter');
sources.forEach(s => {
  const opt = document.createElement('option');
  opt.value = s; opt.textContent = s;
  sourceSelect.appendChild(opt);
});

// Score class helper
function scoreClass(v) {
  if (v >= 85) return 'high';
  if (v >= 70) return 'mid';
  return 'low';
}

// Render list
function renderList(data) {
  const list = document.getElementById('issueList');
  list.innerHTML = '';
  if (data.length === 0) {
    list.innerHTML = '<div style="padding:32px 16px;text-align:center;color:var(--text-tertiary);font-size:13px;">没有匹配的资讯</div>';
    return;
  }
  data.forEach((a, i) => {
    // Row
    const row = document.createElement('div');
    row.className = 'issue-row';
    row.style.animationDelay = (i * 0.03) + 's';
    row.dataset.idx = i;
    row.innerHTML = `
      <div class="issue-score">
        <span class="score-num">${a.importance}</span>
        <div class="score-bar-track"><div class="score-bar-fill ${scoreClass(a.importance)}" style="width:${a.importance}%"></div></div>
      </div>
      <div class="issue-title">${a.title}</div>
      <div class="issue-cat" data-cat="${a.category}">${a.categoryLabel}</div>
      <div class="issue-source">${a.source}</div>
      <div class="issue-time">${a.time}</div>
    `;
    // Detail panel
    const detail = document.createElement('div');
    detail.className = 'issue-detail';
    detail.innerHTML = `
      <div class="detail-summary">${a.summary}</div>
      ${a.why ? `<div class="detail-why">
        <div class="detail-why-label">为什么重要</div>
        <p>${a.why}</p>
      </div>` : ''}
    `;
    // Toggle
    row.addEventListener('click', () => {
      const wasOpen = detail.classList.contains('show');
      // Close all
      document.querySelectorAll('.issue-detail.show').forEach(d => {
        d.classList.remove('show');
        d.previousElementSibling.classList.remove('expanded');
      });
      if (!wasOpen) {
        detail.classList.add('show');
        row.classList.add('expanded');
      }
    });
    list.appendChild(row);
    list.appendChild(detail);
  });
}

// Filter logic
let activeCategory = 'all';
let activeSource = 'all';
let minScore = 0;
let searchQuery = '';

function applyFilters() {
  let filtered = articles;
  if (activeCategory !== 'all') filtered = filtered.filter(a => a.category === activeCategory);
  if (activeSource !== 'all') filtered = filtered.filter(a => a.source === activeSource);
  if (minScore > 0) filtered = filtered.filter(a => a.importance >= minScore);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    filtered = filtered.filter(a =>
      a.title.toLowerCase().includes(q) ||
      a.summary.toLowerCase().includes(q) ||
      a.source.toLowerCase().includes(q) ||
      a.categoryLabel.includes(q)
    );
  }
  renderList(filtered);
}

// Category pills
document.querySelectorAll('.pill').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeCategory = btn.dataset.filter;
    applyFilters();
  });
});

// Source filter
sourceSelect.addEventListener('change', function() {
  activeSource = this.value;
  applyFilters();
});

// Score slider
const slider = document.getElementById('scoreSlider');
const scoreValEl = document.getElementById('scoreVal');
slider.addEventListener('input', function() {
  minScore = parseInt(this.value);
  scoreValEl.textContent = minScore;
  applyFilters();
});

// Search
document.getElementById('searchInput').addEventListener('input', function() {
  searchQuery = this.value.trim();
  applyFilters();
});

// Keyboard: Escape to close expanded
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.issue-detail.show').forEach(d => {
      d.classList.remove('show');
      d.previousElementSibling.classList.remove('expanded');
    });
  }
});

// Initial render
renderList(articles);
</script>
