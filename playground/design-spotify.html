<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#121212;--surface:#181818;--surface-hover:#282828;
  --green:#1DB954;--green-dim:#1aa34a;--green-dark:#148a3c;
  --white:#FFFFFF;--gray:#B3B3B3;--gray-dark:#727272;--gray-darker:#535353;
  --font-heading:'Outfit',sans-serif;--font-body:'Nunito Sans',sans-serif;
}
html{font-size:16px;scroll-behavior:smooth}
body{
  background:var(--bg);color:var(--white);font-family:var(--font-body);
  line-height:1.6;min-height:100vh;padding:1.5rem;
}
::selection{background:var(--green);color:var(--bg)}
::-webkit-scrollbar{width:12px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--gray-darker);border-radius:6px}
::-webkit-scrollbar-thumb:hover{background:var(--gray-dark)}

/* ── Container ── */
.container{max-width:1400px;margin:0 auto}

/* ── Header ── */
.header{margin-bottom:2rem}
.logo{
  font-family:var(--font-heading);font-size:2rem;font-weight:800;
  color:var(--white);margin-bottom:0.5rem;letter-spacing:-0.5px;
}
.logo-accent{color:var(--green)}
.tagline{font-size:0.95rem;color:var(--gray);font-weight:400}

/* ── Stats Row ── */
.stats-row{
  display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;
  margin-bottom:2rem;
}
.stat-card{
  background:var(--surface);border-radius:8px;padding:1.25rem 1.5rem;
  transition:background 0.2s;
}
.stat-card:hover{background:var(--surface-hover)}
.stat-label{
  font-size:0.8rem;color:var(--gray-dark);text-transform:uppercase;
  letter-spacing:1px;font-weight:600;margin-bottom:0.3rem;
}
.stat-value{
  font-size:2rem;font-weight:800;color:var(--green);
  font-family:var(--font-heading);line-height:1;
}
.stat-sub{font-size:0.8rem;color:var(--gray);margin-top:0.4rem}

/* ── Filter Pills ── */
.filter-section{margin-bottom:1.5rem}
.filter-label{
  font-size:0.85rem;color:var(--gray);margin-bottom:0.75rem;
  font-weight:600;text-transform:uppercase;letter-spacing:0.5px;
}
.filter-pills{
  display:flex;flex-wrap:wrap;gap:0.5rem;overflow-x:auto;
  padding-bottom:0.5rem;
}
.filter-pills::-webkit-scrollbar{height:6px}
.filter-pills::-webkit-scrollbar-thumb{background:var(--gray-darker);border-radius:3px}
.pill{
  background:transparent;border:1px solid var(--gray-darker);color:var(--gray);
  padding:0.5rem 1rem;border-radius:20px;font-size:0.85rem;
  cursor:pointer;transition:all 0.2s;white-space:nowrap;
  font-family:var(--font-body);font-weight:600;
}
.pill:hover{border-color:var(--gray);color:var(--white)}
.pill.active{
  background:var(--green);border-color:var(--green);color:var(--bg);
}

/* ── News Grid ── */
.news-grid{
  display:grid;grid-template-columns:repeat(2,1fr);gap:1rem;
  margin-bottom:2rem;
}
.news-card{
  background:var(--surface);border-radius:8px;padding:1.5rem;
  cursor:pointer;transition:all 0.3s;position:relative;
}
.news-card:hover{
  background:var(--surface-hover);
  transform:translateY(-4px);
  box-shadow:0 8px 24px rgba(0,0,0,0.4);
}
.news-card.featured{
  grid-column:1 / -1;
  background:linear-gradient(135deg,#1e3a20 0%,var(--surface) 100%);
  border:1px solid rgba(29,185,84,0.2);
}
.news-card.featured:hover{
  border-color:rgba(29,185,84,0.4);
}
.news-card.expanded{
  background:var(--surface-hover);
}

.card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1rem}
.card-cat{
  background:var(--green);color:var(--bg);font-size:0.7rem;
  padding:0.3rem 0.7rem;border-radius:12px;font-weight:700;
  text-transform:uppercase;letter-spacing:0.5px;
}
.card-score-ring{width:48px;height:48px;position:relative}
.card-score-ring svg{transform:rotate(-90deg)}
.card-score-ring circle{
  fill:none;stroke-width:4;
}
.card-score-ring .ring-bg{stroke:rgba(255,255,255,0.1)}
.card-score-ring .ring-fill{
  stroke:var(--green);stroke-linecap:round;
  transition:stroke-dashoffset 0.5s;
}
.card-score-text{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:0.85rem;font-weight:700;color:var(--green);
}

.card-title{
  font-family:var(--font-heading);font-size:1.1rem;font-weight:700;
  color:var(--white);line-height:1.4;margin-bottom:0.75rem;
}
.news-card.featured .card-title{font-size:1.5rem;margin-bottom:1rem}

.card-meta{display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
.card-source{
  font-size:0.8rem;padding:0.25rem 0.6rem;border-radius:4px;
  font-weight:600;border:1px solid;
}
.src-official{color:#1DB954;border-color:rgba(29,185,84,0.3);background:rgba(29,185,84,0.1)}
.src-community{color:#e040fb;border-color:rgba(224,64,251,0.3);background:rgba(224,64,251,0.1)}
.src-media{color:#ffb300;border-color:rgba(255,179,0,0.3);background:rgba(255,179,0,0.1)}
.src-individual{color:#00e5ff;border-color:rgba(0,229,255,0.3);background:rgba(0,229,255,0.1)}
.card-time{font-size:0.8rem;color:var(--gray-dark)}

.card-detail{
  margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid rgba(255,255,255,0.1);
  display:none;
}
.news-card.expanded .card-detail{display:block;animation:fadeIn 0.3s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.detail-section{margin-bottom:1rem}
.detail-label{
  font-size:0.75rem;color:var(--gray-dark);text-transform:uppercase;
  letter-spacing:1px;font-weight:700;margin-bottom:0.4rem;
}
.detail-text{font-size:0.9rem;color:var(--gray);line-height:1.6}
.detail-why{color:var(--white)}
.detail-tags{display:flex;flex-wrap:wrap;gap:0.4rem;margin-top:0.5rem}
.detail-tag{
  font-size:0.7rem;color:var(--gray);background:rgba(255,255,255,0.05);
  padding:0.25rem 0.6rem;border-radius:12px;
}

/* ── Footer ── */
.footer{
  text-align:center;padding:2rem 0;color:var(--gray-dark);
  font-size:0.85rem;border-top:1px solid rgba(255,255,255,0.05);
  margin-top:3rem;
}
.footer a{color:var(--gray);text-decoration:none;transition:color 0.2s}
.footer a:hover{color:var(--green)}

/* ── Responsive ── */
@media(max-width:1024px){
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .news-grid{grid-template-columns:1fr}
}
@media(max-width:640px){
  html{font-size:14px}
  body{padding:1rem}
  .stats-row{grid-template-columns:1fr;gap:0.75rem}
  .logo{font-size:1.5rem}
  .card-title{font-size:1rem}
  .news-card.featured .card-title{font-size:1.2rem}
}
</style>
</head>

// ── Render ──
function renderGrid(data) {
  const grid = document.getElementById('newsGrid');
  grid.innerHTML = '';
  data.forEach((a, i) => {
    const srcClass = 'src-' + a.sourceType;
    const circumference = 2 * Math.PI * 20;
    const offset = circumference - (a.score / 10) * circumference;
    const isFeatured = i === 0;

    const card = document.createElement('div');
    card.className = 'news-card' + (isFeatured ? ' featured' : '');
    card.setAttribute('data-source', a.sourceType);
    card.setAttribute('data-cat', a.category);
    card.setAttribute('data-score', a.score);

    card.innerHTML = `
      <div class="card-header">
        <span class="card-cat">${a.catLabel}</span>
        <div class="card-score-ring">
          <svg width="48" height="48">
            <circle class="ring-bg" cx="24" cy="24" r="20"></circle>
            <circle class="ring-fill" cx="24" cy="24" r="20"
              stroke-dasharray="${circumference}"
              stroke-dashoffset="${offset}"></circle>
          </svg>
          <span class="card-score-text">${a.score}</span>
        </div>
      </div>
      <div class="card-title">${a.title}</div>
      <div class="card-meta">
        <span class="card-source ${srcClass}">${a.source}</span>
        <span class="card-time">${a.time}</span>
      </div>
      <div class="card-detail">
        <div class="detail-section">
          <div class="detail-label">摘要</div>
          <div class="detail-text">${a.summary}</div>
        </div>
        <div class="detail-section">
          <div class="detail-label">为什么重要</div>
          <div class="detail-text detail-why">${a.why}</div>
        </div>
        <div class="detail-section">
          <div class="detail-label">标签</div>
          <div class="detail-tags">${a.tags.map(t => `<span class="detail-tag">#${t}</span>`).join('')}</div>
        </div>
      </div>`;

    card.addEventListener('click', () => {
      card.classList.toggle('expanded');
    });

    grid.appendChild(card);
  });
}

// ── Filters ──
let activeSource = 'all';
let activeCat = 'all';

function applyFilters() {
  let filtered = articles.filter(a => {
    if (activeSource !== 'all' && a.sourceType !== activeSource) return false;
    if (activeCat !== 'all' && a.category !== activeCat) return false;
    return true;
  });
  filtered.sort((a, b) => b.score - a.score);
  renderGrid(filtered);
}

document.getElementById('sourceFilters').addEventListener('click', e => {
  const btn = e.target.closest('.pill');
  if (!btn) return;
  document.querySelectorAll('#sourceFilters .pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeSource = btn.dataset.filter;
  applyFilters();
});

document.getElementById('categoryFilters').addEventListener('click', e => {
  const btn = e.target.closest('.pill');
  if (!btn) return;
  document.querySelectorAll('#categoryFilters .pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeCat = btn.dataset.cat;
  applyFilters();
});

// ── Init ──
renderGrid(articles);
</script>
</body>
</html>
