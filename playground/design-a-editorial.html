<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Radar — Design A: Editorial</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#141414;--surface:#1c1c1c;--surface2:#242424;--border:#2a2a2a;
  --gold:#d4a853;--gold-dim:#a07d3a;--gold-glow:rgba(212,168,83,.15);
  --text:#e8e4dc;--text2:#9a9590;--text3:#5a5550;
  --accent:#c9a84c;--red:#c45c5c;--green:#6bab6b;
}
body{background:var(--bg);color:var(--text);font-family:'Source Sans 3',sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased}
a{color:var(--gold);text-decoration:none;transition:color .2s}
a:hover{color:#f0d080}

/* Nav */
.nav{display:flex;align-items:center;justify-content:space-between;padding:20px 40px;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(20,20,20,.92);backdrop-filter:blur(12px);z-index:100}
.nav-logo{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;color:var(--gold);letter-spacing:-.02em}
.nav-logo span{color:var(--text3);font-weight:400;font-size:.9rem;margin-left:8px;font-family:'Source Sans 3',sans-serif}
.nav-links{display:flex;gap:24px;align-items:center}
.nav-links a{color:var(--text2);font-size:.9rem;font-weight:500;transition:color .2s}
.nav-links a:hover,.nav-links a.active{color:var(--gold)}
.nav-date{color:var(--text3);font-size:.8rem}

/* Container */
.container{max-width:1200px;margin:0 auto;padding:24px 40px}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;transition:border-color .3s}
.stat:hover{border-color:var(--gold-dim)}
.stat.highlight{background:var(--gold-glow);border-color:var(--gold-dim)}
.stat-value{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;color:var(--text)}
.stat.highlight .stat-value{color:var(--gold)}
.stat-unit{font-size:.85rem;color:var(--text3);margin-left:4px;font-weight:400}
.stat-label{font-size:.8rem;color:var(--text3);margin-top:4px}

/* Filters */
.filters{margin-bottom:28px;display:flex;flex-direction:column;gap:12px}
.search-row{position:relative}
.search-row input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 16px 10px 40px;color:var(--text);font-size:.9rem;outline:none;transition:border-color .3s}
.search-row input:focus{border-color:var(--gold-dim)}
.search-row::before{content:'⌕';position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:1.1rem}
.search-row input::placeholder{color:var(--text3)}
.filter-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.pill{padding:6px 14px;border-radius:20px;font-size:.8rem;font-weight:500;cursor:pointer;transition:all .25s;border:1px solid var(--border);background:transparent;color:var(--text2)}
.pill:hover{border-color:var(--text3);color:var(--text)}
.pill.active{background:var(--gold);border-color:var(--gold);color:#141414;font-weight:600}
.pill .count{font-size:.7rem;opacity:.7;margin-left:4px}
.filter-group{display:flex;gap:4px;background:var(--surface);border-radius:10px;padding:3px}
.filter-btn{padding:5px 12px;border-radius:8px;font-size:.78rem;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--text3);transition:all .2s}
.filter-btn:hover{color:var(--text2)}
.filter-btn.active{background:var(--surface2);color:var(--text)}
.spacer{flex:1}
.score-filter{display:flex;align-items:center;gap:8px;font-size:.8rem;color:var(--text3)}
.score-filter input[type=range]{width:80px;accent-color:var(--gold)}
.score-val{color:var(--gold);min-width:16px}

/* Article Grid — Editorial Layout */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.grid .card:first-child{grid-row:1/3}

/* Card */
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;transition:all .3s;cursor:default;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:14px 14px 0 0;transition:opacity .3s;opacity:0}
.card:hover{border-color:var(--gold-dim);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.3)}
.card:hover::before{opacity:1}
.card[data-score="10"]::before,.card[data-score="9"]::before{background:var(--gold);opacity:1}
.card[data-score="8"]::before{background:var(--gold-dim);opacity:.7}
.card-meta{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.card-category{font-size:.75rem;font-weight:600;padding:3px 10px;border-radius:12px;background:var(--gold-glow);color:var(--gold);white-space:nowrap}
.card-source{font-size:.72rem;color:var(--text3);background:var(--surface2);padding:2px 8px;border-radius:8px}
.card-time{font-size:.72rem;color:var(--text3);margin-left:auto}
.card-title{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:700;line-height:1.4;margin-bottom:8px;color:var(--text)}
.card-title a{color:inherit;transition:color .2s}
.card-title a:hover{color:var(--gold)}
.card:first-child .card-title{font-size:1.5rem}
.card-summary{font-size:.88rem;color:var(--text2);line-height:1.6;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.card:first-child .card-summary{-webkit-line-clamp:5}
.card-insight{font-size:.82rem;color:var(--text2);padding:10px 14px;border-left:3px solid var(--gold-dim);background:rgba(212,168,83,.05);border-radius:0 8px 8px 0;margin-bottom:12px;font-style:italic}
.card-footer{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.card-score{display:flex;gap:3px;align-items:center}
.dot{width:6px;height:6px;border-radius:50%;background:var(--border)}
.dot.filled{background:var(--gold)}
.dot.filled.high{background:var(--gold);box-shadow:0 0 6px var(--gold)}
.card-tags{display:flex;gap:6px;flex-wrap:wrap;margin-left:auto}
.tag{font-size:.7rem;color:var(--text3);background:var(--surface2);padding:2px 8px;border-radius:6px}

/* Empty */
.empty{text-align:center;padding:80px 20px;color:var(--text3)}
.empty-icon{font-size:3rem;margin-bottom:12px}

/* Responsive */
@media(max-width:768px){
  .nav{padding:16px 20px}
  .container{padding:16px 20px}
  .stats{grid-template-columns:repeat(2,1fr)}
  .grid{grid-template-columns:1fr}
  .grid .card:first-child{grid-row:auto}
  .filter-row{gap:6px}
}
@media(max-width:480px){
  .stats{grid-template-columns:1fr 1fr}
  .nav-links{gap:12px}
}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.card{animation:fadeUp .4s ease both}
.card:nth-child(2){animation-delay:.05s}
.card:nth-child(3){animation-delay:.1s}
.card:nth-child(4){animation-delay:.15s}
.card:nth-child(5){animation-delay:.2s}
.card:nth-child(6){animation-delay:.25s}
.card:nth-child(7){animation-delay:.3s}
.card:nth-child(8){animation-delay:.35s}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo">📡 AI Radar <span>全球 AI 资讯聚合</span></div>
  <div class="nav-links">
    <a href="#" class="active">今日资讯</a>
    <a href="#">每日简报</a>
    <span class="nav-date">2026-03-19</span>
  </div>
</nav>

<div class="container">
  <!-- Stats -->
  <div class="stats">
    <div class="stat"><div class="stat-value">156<span class="stat-unit">条</span></div><div class="stat-label">总计资讯</div></div>
    <div class="stat"><div class="stat-value">89<span class="stat-unit">条</span></div><div class="stat-label">过滤后显示</div></div>
    <div class="stat highlight"><div class="stat-value">23<span class="stat-unit">条</span></div><div class="stat-label">高信号 ≥7分</div></div>
    <div class="stat"><div class="stat-value">6.8<span class="stat-unit">/10</span></div><div class="stat-label">平均重要性</div></div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <div class="search-row"><input type="text" placeholder="搜索标题或摘要..." id="search"></div>
    <div class="filter-row" id="categories">
      <span class="pill active" data-cat="all">全部</span>
      <span class="pill" data-cat="model_release">🚀 模型发布<span class="count">12</span></span>
      <span class="pill" data-cat="product_tool">🛠️ 产品工具<span class="count">18</span></span>
      <span class="pill" data-cat="research_paper">📄 研究论文<span class="count">15</span></span>
      <span class="pill" data-cat="industry_news">📡 行业动态<span class="count">22</span></span>
      <span class="pill" data-cat="funding_ma">💰 融资并购<span class="count">8</span></span>
      <span class="pill" data-cat="policy_regulation">⚖️ 政策监管<span class="count">5</span></span>
      <span class="pill" data-cat="open_source">🔧 开源项目<span class="count">11</span></span>
      <span class="pill" data-cat="opinion_insight">💡 观点洞察<span class="count">9</span></span>
    </div>
    <div class="filter-row">
      <div class="filter-group">
        <button class="filter-btn active" data-src="all">全部来源</button>
        <button class="filter-btn" data-src="official">官方</button>
        <button class="filter-btn" data-src="community">社区</button>
        <button class="filter-btn" data-src="person">个人</button>
        <button class="filter-btn" data-src="media">媒体</button>
      </div>
      <div class="filter-group">
        <button class="filter-btn active" data-sort="importance">按重要性</button>
        <button class="filter-btn" data-sort="time">按时间</button>
      </div>
      <div class="spacer"></div>
      <div class="score-filter">
        最低分: <input type="range" min="1" max="9" value="1" id="minScore"> <span class="score-val" id="scoreVal">1</span>
      </div>
    </div>
  </div>

  <!-- Articles -->
  <div class="grid" id="grid"></div>
</div>

<script>
const articles = [
  {cat:'model_release',src:'OpenAI',srcType:'official',title:'OpenAI 发布 GPT-5：多模态推理能力大幅跃升',summary:'OpenAI 正式发布 GPT-5 模型，在数学推理、代码生成和多模态理解方面取得显著突破。新模型支持原生图像和音频输入，推理速度提升 40%。',insight:'GPT-5 的发布将重新定义 AI 应用的能力边界，开发者需要重新评估现有产品的竞争力。',score:10,time:'2小时前',tags:['GPT-5','多模态','推理']},
  {cat:'product_tool',src:'Anthropic',srcType:'official',title:'Claude Code 2.0 发布：AI 编程助手进入自主开发时代',summary:'Anthropic 推出 Claude Code 2.0，支持多文件编辑、自主调试和端到端项目构建。内置 MCP 协议支持，可连接外部工具链。',insight:'AI 编程工具从"辅助补全"进化到"自主开发"，软件工程师的工作方式将发生根本性转变。',score:9,time:'4小时前',tags:['Claude','编程','MCP']},
  {cat:'research_paper',src:'arXiv',srcType:'community',title:'DeepSeek 团队发表 MoE 架构新论文：万亿参数模型训练成本降低 60%',summary:'DeepSeek 研究团队提出新型 Mixture-of-Experts 架构，通过动态路由和稀疏激活机制，将万亿参数模型的训练成本降低 60%，推理延迟降低 45%。',insight:'训练成本的大幅下降意味着更多中小团队可以训练大规模模型，AI 领域的竞争格局可能加速变化。',score:9,time:'5小时前',tags:['MoE','训练优化','DeepSeek']},
  {cat:'industry_news',src:'TechCrunch',srcType:'media',title:'苹果收购 AI 视觉初创公司 DarwinAI，加速端侧 AI 布局',summary:'苹果以约 5 亿美元收购加拿大 AI 公司 DarwinAI，该公司专注于高效神经网络架构搜索和模型压缩技术，将助力 Apple Intelligence 在设备端的部署。',insight:'苹果持续加码端侧 AI，这笔收购表明下一代 iPhone 的 AI 能力将有质的飞跃。',score:8,time:'6小时前',tags:['苹果','收购','端侧AI']},
  {cat:'funding_ma',src:'VentureBeat',srcType:'media',title:'AI Agent 平台 Cognition 完成 1.75 亿美元 B 轮融资',summary:'Devin AI 背后的公司 Cognition 宣布完成 1.75 亿美元 B 轮融资，由 Founders Fund 领投，估值达 20 亿美元。资金将用于扩展 AI Agent 的自主编程能力。',insight:'AI Agent 赛道持续升温，Cognition 的高估值反映了市场对自主 AI 开发工具的强烈预期。',score:8,time:'8小时前',tags:['融资','Agent','Cognition']},
  {cat:'open_source',src:'GitHub Trending',srcType:'community',title:'Llama 4 Scout 开源发布：Meta 最强开源模型支持 1000 万 token 上下文',summary:'Meta 正式开源 Llama 4 Scout 模型，采用 MoE 架构，支持 1000 万 token 超长上下文窗口，在多项基准测试中超越 GPT-4o 和 Gemini 1.5 Pro。',insight:'超长上下文 + 开源 = 企业级 RAG 应用的游戏规则改变者，私有化部署成本将大幅降低。',score:9,time:'10小时前',tags:['Llama 4','开源','长上下文']},
  {cat:'policy_regulation',src:'MIT Tech Review',srcType:'media',title:'欧盟 AI 法案正式生效：高风险 AI 系统面临严格合规要求',summary:'欧盟《人工智能法案》正式生效，对高风险 AI 系统实施分级监管。涉及生物识别、关键基础设施和教育领域的 AI 应用需在 6 个月内完成合规审查。',insight:'出海企业需要立即评估产品合规性，不合规的 AI 系统将面临最高 3500 万欧元或全球营收 7% 的罚款。',score:7,time:'12小时前',tags:['欧盟','监管','合规']},
  {cat:'opinion_insight',src:'Andrej Karpathy',srcType:'person',title:'Karpathy 长文：为什么 AI Agent 的可靠性问题比能力问题更重要',summary:'Andrej Karpathy 发表博客文章，深入分析当前 AI Agent 面临的核心挑战。他认为 Agent 的可靠性（而非能力）才是阻碍大规模商业化的关键瓶颈。',insight:'从技术领袖的视角看 Agent 落地的真正障碍，对产品设计和技术选型都有重要参考价值。',score:8,time:'14小时前',tags:['Agent','可靠性','Karpathy']},
  {cat:'product_tool',src:"Ben's Bites",srcType:'media',title:'Cursor 推出 Background Agent：后台自主完成开发任务',summary:'AI 代码编辑器 Cursor 发布 Background Agent 功能，可以在后台自主完成代码修改、测试运行和 PR 创建，开发者只需审核最终结果。',insight:'编程工具正在从"实时协作"转向"异步委托"模式，开发者的角色将更偏向架构设计和代码审核。',score:8,time:'16小时前',tags:['Cursor','Agent','编程工具']},
  {cat:'industry_news',src:'CNBC',srcType:'media',title:'英伟达 GTC 2026：Blackwell Ultra 芯片性能提升 3 倍，推理成本再降 50%',summary:'黄仁勋在 GTC 2026 大会上发布 Blackwell Ultra GPU，单卡推理性能较上代提升 3 倍。同时宣布与主要云厂商合作，将 AI 推理成本降低 50%。',insight:'推理成本持续下降将加速 AI 应用的普及，对 API 定价和商业模式产生深远影响。',score:8,time:'18小时前',tags:['英伟达','GTC','Blackwell']}
];

function renderDots(score){
  let html='';
  for(let i=1;i<=10;i++){
    const cls=i<=score?(score>=8?'dot filled high':'dot filled'):'dot';
    html+=`<span class="${cls}"></span>`;
  }
  return html;
}

function renderCards(list){
  const grid=document.getElementById('grid');
  if(!list.length){grid.innerHTML='<div class="empty"><div class="empty-icon">📡</div><p>暂无匹配资讯</p></div>';return}
  grid.innerHTML=list.map(a=>`
    <div class="card" data-score="${a.score}" data-cat="${a.cat}" data-src="${a.srcType}">
      <div class="card-meta">
        <span class="card-category">${catLabel(a.cat)}</span>
        <span class="card-source">${a.src}</span>
        <span class="card-time">${a.time}</span>
      </div>
      <div class="card-title"><a href="#">${a.title}</a></div>
      <div class="card-summary">${a.summary}</div>
      <div class="card-insight">💡 ${a.insight}</div>
      <div class="card-footer">
        <div class="card-score">${renderDots(a.score)}</div>
        <div class="card-tags">${a.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      </div>
    </div>
  `).join('');
}

const catLabels={model_release:'🚀 模型发布',product_tool:'🛠️ 产品工具',research_paper:'📄 研究论文',industry_news:'📡 行业动态',funding_ma:'💰 融资并购',policy_regulation:'⚖️ 政策监管',open_source:'🔧 开源项目',opinion_insight:'💡 观点洞察'};
function catLabel(c){return catLabels[c]||c}

let state={cat:'all',src:'all',sort:'importance',minScore:1,query:''};

function applyFilters(){
  let list=articles.filter(a=>{
    if(state.cat!=='all'&&a.cat!==state.cat)return false;
    if(state.src!=='all'&&a.srcType!==state.src)return false;
    if(a.score<state.minScore)return false;
    if(state.query){const q=state.query.toLowerCase();if(!a.title.toLowerCase().includes(q)&&!a.summary.includes(q))return false}
    return true;
  });
  if(state.sort==='time')list=[...list];
  renderCards(list);
}

// Category pills
document.getElementById('categories').addEventListener('click',e=>{
  const pill=e.target.closest('.pill');if(!pill)return;
  document.querySelectorAll('#categories .pill').forEach(p=>p.classList.remove('active'));
  pill.classList.add('active');
  state.cat=pill.dataset.cat;
  applyFilters();
});

// Source filter
document.querySelectorAll('[data-src]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    btn.parentElement.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    state.src=btn.dataset.src;
    applyFilters();
  });
});

// Sort
document.querySelectorAll('[data-sort]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    btn.parentElement.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    state.sort=btn.dataset.sort;
    applyFilters();
  });
});

// Score
document.getElementById('minScore').addEventListener('input',e=>{
  state.minScore=parseInt(e.target.value);
  document.getElementById('scoreVal').textContent=state.minScore;
  applyFilters();
});

// Search
document.getElementById('search').addEventListener('input',e=>{
  state.query=e.target.value;
  applyFilters();
});

renderCards(articles);
</script>
</body>
</html>
