<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Radar — Warm Neon Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f0d0b;--bg-raised:#1a1714;
  --amber:#ff9f1c;--amber-dim:#b36e0a;--amber-glow:rgba(255,159,28,0.25);
  --red:#ef4444;--red-glow:rgba(239,68,68,0.25);
  --teal:#2dd4bf;--green:#86efac;
  --cream:#fef3c7;--cream-dim:rgba(254,243,199,0.5);--cream-muted:rgba(254,243,199,0.3);
  --bw:rgba(255,159,28,0.15);--bws:rgba(255,159,28,0.35);
  --mono:'IBM Plex Mono',monospace;--body:'Space Grotesk',sans-serif;
}
body{background:var(--bg);color:var(--cream);font-family:var(--body);line-height:1.6;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;opacity:0.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:256px;pointer-events:none;z-index:9999}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 50%,rgba(15,13,11,0.6) 100%);pointer-events:none;z-index:9998}
.c{max-width:900px;margin:0 auto;padding:0 16px;position:relative;z-index:1}
/* NAV */
.nav{padding:20px 0 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bw)}
.brand{display:flex;align-items:center;gap:12px}
.dot{width:10px;height:10px;background:var(--amber);border-radius:50%;box-shadow:0 0 8px var(--amber),0 0 20px var(--amber-glow);animation:pw 2s ease-in-out infinite}
@keyframes pw{0%,100%{box-shadow:0 0 8px var(--amber),0 0 20px var(--amber-glow)}50%{box-shadow:0 0 14px var(--amber),0 0 35px var(--amber-glow),0 0 50px rgba(255,159,28,0.1)}}
.bname{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--amber);letter-spacing:3px;text-shadow:0 0 20px var(--amber-glow)}
.scan{font-family:var(--mono);font-size:11px;color:var(--cream-muted);display:flex;align-items:center;gap:6px}
.scan .bl{width:6px;height:6px;background:var(--teal);border-radius:50%;animation:bk 1.5s step-end infinite}
@keyframes bk{0%,100%{opacity:1}50%{opacity:0}}
/* STATS */
.stats{margin:16px 0;padding:12px 20px;display:flex;justify-content:space-between;background:linear-gradient(135deg,rgba(255,159,28,0.06),rgba(26,23,20,0.8));border:1px solid var(--bw);border-radius:8px;backdrop-filter:blur(10px)}
.si{text-align:center}
.sv{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--amber);text-shadow:0 0 12px var(--amber-glow);line-height:1.2}
.sv.tl{color:var(--teal);text-shadow:0 0 12px rgba(45,212,191,0.25)}
.sv.rd{color:var(--red);text-shadow:0 0 12px var(--red-glow)}
.sl{font-family:var(--mono);font-size:10px;color:var(--cream-muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px}
/* FILTERS */
.fb{margin:14px 0;display:flex;flex-direction:column;gap:10px}
.fr{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.fl{font-family:var(--mono);font-size:10px;color:var(--cream-muted);text-transform:uppercase;letter-spacing:1px;min-width:50px;flex-shrink:0}
.fp{font-family:var(--mono);font-size:12px;padding:4px 12px;border-radius:20px;border:1px solid var(--bws);background:transparent;color:var(--cream-dim);cursor:pointer;transition:all .2s;white-space:nowrap}
.fp:hover{border-color:var(--amber);color:var(--amber);background:rgba(255,159,28,0.08)}
.fp.on{border-color:var(--amber);color:var(--bg);background:var(--amber);box-shadow:0 0 10px var(--amber-glow)}
/* ARTICLES */
.al{margin:8px 0 40px;display:flex;flex-direction:column;gap:2px}
.ar{padding:10px 12px;border-radius:6px;border:1px solid transparent;cursor:pointer;transition:all .2s}
.ar:hover{background:rgba(255,159,28,0.04);border-color:var(--bw)}
.ar.ex{background:var(--bg-raised);border-color:var(--bws);box-shadow:0 0 20px rgba(255,159,28,0.05)}
.am{display:flex;align-items:center;gap:12px}
.rk{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--amber);text-shadow:0 0 10px var(--amber-glow);min-width:22px;text-align:right;flex-shrink:0}
.ib{width:4px;height:28px;border-radius:2px;flex-shrink:0}
.ib.cr{background:var(--red);box-shadow:0 0 8px var(--red-glow)}
.ib.hi{background:var(--amber);box-shadow:0 0 6px var(--amber-glow)}
.ib.md{background:var(--amber-dim);opacity:.7}
.ib.lo{background:rgba(254,243,199,0.15)}
.ac{flex:1;min-width:0;display:flex;flex-direction:column;gap:4px}
.atr{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.at{font-family:var(--body);font-size:14px;font-weight:500;color:var(--cream);transition:color .2s;line-height:1.4}
.ar:hover .at{color:var(--amber)}
.ame{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.sb{font-family:var(--mono);font-size:10px;padding:2px 8px;border-radius:10px;backdrop-filter:blur(4px)}
.sb.of{background:rgba(255,159,28,0.12);color:var(--amber);border:1px solid rgba(255,159,28,0.25)}
.sb.cm{background:rgba(45,212,191,0.1);color:var(--teal);border:1px solid rgba(45,212,191,0.2)}
.sb.ps{background:rgba(239,68,68,0.1);color:var(--red);border:1px solid rgba(239,68,68,0.2)}
.sb.me{background:rgba(134,239,172,0.1);color:var(--green);border:1px solid rgba(134,239,172,0.2)}
.cp{font-family:var(--mono);font-size:10px;padding:2px 8px;border-radius:10px;border:1px solid var(--bws);color:var(--cream-dim)}
.ti{font-family:var(--mono);font-size:10px;color:var(--cream-muted);margin-left:auto;flex-shrink:0}
.sc{font-family:var(--mono);font-size:12px;font-weight:600;min-width:28px;text-align:center;flex-shrink:0}
.sc.cr{color:var(--red);text-shadow:0 0 8px var(--red-glow)}
.sc.hi{color:var(--amber);text-shadow:0 0 6px var(--amber-glow)}
.sc.md{color:var(--amber-dim)}
.sc.lo{color:var(--cream-muted)}
/* DETAIL */
.ad{max-height:0;overflow:hidden;transition:max-height .35s ease,opacity .3s ease;opacity:0}
.ar.ex .ad{max-height:400px;opacity:1}
.di{padding:12px 0 4px 38px}
.ds{font-size:13px;color:var(--cream-dim);line-height:1.7;margin-bottom:10px}
.dc{border-left:3px solid var(--amber);padding:8px 14px;margin-bottom:10px;background:rgba(255,159,28,0.05);border-radius:0 6px 6px 0}
.dcl{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--amber);margin-bottom:4px}
.dct{font-size:13px;color:var(--cream-dim);line-height:1.6}
.dt{display:flex;gap:6px;flex-wrap:wrap}
.tg{font-family:var(--mono);font-size:10px;padding:2px 8px;border-radius:4px;background:rgba(255,159,28,0.08);color:var(--amber-dim);border:1px solid rgba(255,159,28,0.12)}
/* RESPONSIVE */
@media(max-width:640px){
  .stats{flex-wrap:wrap;gap:12px;justify-content:center}
  .si{min-width:80px}.am{gap:8px}.ti{display:none}
  .di{padding-left:12px}.bname{font-size:16px;letter-spacing:2px}
  .scan{font-size:10px}.at{font-size:13px}
}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bws);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--amber-dim)}
</style>
</head>
<body>
<div class="c">
<!-- Nav -->
<nav class="nav">
  <div class="brand"><div class="dot"></div><span class="bname">AI RADAR</span></div>

<!-- Stats -->

<div class="al" id="articleList"></div>
</div>

summary:"Anthropic 为 Claude 推出 Artifacts 2.0，用户可以通过对话生成完整的交互式 Web 应用，并一键部署到自定义域名。支持数据库集成和 API 调用。",
why:"这模糊了 AI 助手和开发平台的边界，非技术用户也能快速构建和部署应用，可能重新定义低代码/无代码市场格局。",

why:"端侧 AI 是下一个重要战场，能在手机上流畅运行的高质量模型将催生大量离线 AI 应用场景，对隐私敏感型应用尤为重要。",
tags:["SmolLM","端侧AI","移动端","小模型"]}
];
function scoreClass(s){if(s>=9)return'cr';if(s>=7)return'hi';if(s>=5)return'md';return'lo'}
function renderArticles(list){
  const el=document.getElementById('articleList');
  el.innerHTML=list.map((a,i)=>`
<div class="ar" data-cat="${a.cat}" data-src="${a.srcType}" onclick="toggle(this)">
  <div class="am">
    <span class="rk">${String(i+1).padStart(2,'0')}</span>
    <div class="ib ${scoreClass(a.score)}"></div>
    <div class="ac">
      <div class="atr"><span class="at">${a.title}</span></div>
      <div class="ame">
        <span class="sb ${a.srcType==='official'?'of':a.srcType==='community'?'cm':a.srcType==='person'?'ps':'me'}">${a.source}</span>
        <span class="cp">${a.catIcon}${a.cat}</span>
        <span class="ti">${a.time}</span>
      </div>
    </div>
    <span class="sc ${scoreClass(a.score)}">${a.score.toFixed(1)}</span>
  </div>
  <div class="ad"><div class="di">
    <p class="ds">${a.summary}</p>
    <div class="dc"><div class="dcl">为什么重要</div><div class="dct">${a.why}</div></div>
    <div class="dt">${a.tags.map(t=>`<span class="tg">${t}</span>`).join('')}</div>
  </div></div>
</div>`).join('');
}
function toggle(el){el.classList.toggle('ex')}
// Filters
let activeCat='all',activeSrc='all';
function applyFilters(){
  const filtered=articles.filter(a=>{
    if(activeCat!=='all'&&a.cat!==activeCat)return false;
    if(activeSrc!=='all'&&a.srcType!==activeSrc)return false;
    return true;
  });
  renderArticles(filtered);
}
document.querySelectorAll('.fp[data-cat]').forEach(btn=>{
  btn.addEventListener('click',e=>{
    e.stopPropagation();
    document.querySelectorAll('.fp[data-cat]').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
    activeCat=btn.dataset.cat;
    applyFilters();
  });
});
document.querySelectorAll('.fp[data-src]').forEach(btn=>{
  btn.addEventListener('click',e=>{
    e.stopPropagation();
    document.querySelectorAll('.fp[data-src]').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
    activeSrc=btn.dataset.src;
    applyFilters();
  });
});
renderArticles(articles);
</script>
</body>
</html>
