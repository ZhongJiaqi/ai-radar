<head>

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d1117;--surface:#161b22;--border:#30363d;
  --primary:#58a6ff;--green:#3fb950;--red:#f85149;--orange:#d29922;--purple:#bc8cff;
  --text:#e6edf3;--text-secondary:#8b949e;--text-tertiary:#484f58;
  --font-body:'Atkinson Hyperlegible',sans-serif;
  --font-data:'Space Mono',monospace;
}
html{font-size:14px;scroll-behavior:smooth}
body{
  background:var(--bg);color:var(--text);font-family:var(--font-body);
  line-height:1.6;min-height:100vh;
}
::selection{background:var(--primary);color:var(--bg)}
::-webkit-scrollbar{width:10px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:5px}
::-webkit-scrollbar-thumb:hover{background:var(--text-tertiary)}

/* ── Container ── */
.container{max-width:1280px;margin:0 auto;padding:1.5rem}

/* ── Header ── */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding-bottom:1.5rem;border-bottom:1px solid var(--border);margin-bottom:1.5rem;
}
.header-left{display:flex;align-items:center;gap:1rem}
.logo{font-size:1.5rem;font-weight:700;color:var(--text);display:flex;align-items:center;gap:0.5rem}
.logo-icon{
  width:32px;height:32px;background:var(--primary);border-radius:6px;
  display:flex;align-items:center;justify-content:center;color:var(--bg);font-weight:700;
}
.nav{display:flex;gap:1rem;align-items:center}
.nav-link{
  color:var(--text);text-decoration:none;font-size:0.95rem;
  padding:0.4rem 0.8rem;border-radius:6px;transition:background 0.2s;
}
.nav-link:hover{background:var(--surface)}
.nav-link.active{font-weight:700}

/* ── Stats Banner ── */
.stats-banner{
  background:var(--surface);border:1px solid var(--border);border-radius:6px;
  padding:1rem 1.5rem;margin-bottom:1.5rem;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;
}
.stats-left{display:flex;align-items:center;gap:2rem}
.stat-item{display:flex;align-items:baseline;gap:0.5rem}
.stat-label{color:var(--text-secondary);font-size:0.85rem}
.stat-value{color:var(--text);font-weight:700;font-size:1.1rem;font-family:var(--font-data)}
.stats-right{display:flex;gap:0.5rem}
.btn-icon{
  background:transparent;border:1px solid var(--border);color:var(--text-secondary);
  padding:0.4rem 0.8rem;border-radius:6px;cursor:pointer;font-size:0.85rem;
  transition:all 0.2s;font-family:var(--font-body);
}
.btn-icon:hover{border-color:var(--text-secondary);color:var(--text)}

/* ── Filter Bar ── */
.filter-bar{
  display:flex;align-items:center;gap:0.75rem;margin-bottom:1.5rem;flex-wrap:wrap;
}
.search-box{
  flex:1;min-width:300px;position:relative;
}
.search-input{
  width:100%;background:var(--surface);border:1px solid var(--border);
  color:var(--text);padding:0.5rem 0.75rem;border-radius:6px;
  font-family:var(--font-body);font-size:0.9rem;
}
.search-input::placeholder{color:var(--text-tertiary)}
.search-input:focus{outline:none;border-color:var(--primary)}
.filter-dropdown{
  position:relative;
}
.filter-btn{
  background:var(--surface);border:1px solid var(--border);color:var(--text);
  padding:0.5rem 0.75rem;border-radius:6px;cursor:pointer;
  font-family:var(--font-body);font-size:0.85rem;display:flex;align-items:center;gap:0.4rem;
  transition:all 0.2s;
}
.filter-btn:hover{border-color:var(--text-secondary)}
.filter-btn.active{border-color:var(--primary);color:var(--primary)}
.filter-btn::after{content:'▾';font-size:0.7rem;color:var(--text-secondary)}

/* ── Issue List ── */
.issue-list{border:1px solid var(--border);border-radius:6px;overflow:hidden}
.issue-item{
  border-bottom:1px solid var(--border);background:var(--bg);
  transition:background 0.15s;cursor:pointer;
}
.issue-item:last-child{border-bottom:none}
.issue-item:hover{background:var(--surface)}
.issue-item.expanded{background:var(--surface)}

.issue-row{
  display:grid;
  grid-template-columns:auto 1fr auto auto auto;
  align-items:center;gap:0.75rem;padding:0.75rem 1rem;
}
.issue-icon{
  width:20px;height:20px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:0.7rem;flex-shrink:0;
}
.cat-model{background:var(--green);color:var(--bg)}
.cat-product{background:var(--primary);color:var(--bg)}
.cat-research{background:var(--purple);color:var(--bg)}
.cat-opensource{background:var(--orange);color:var(--bg)}
.cat-policy{background:var(--red);color:var(--bg)}
.cat-insight{background:var(--text-secondary);color:var(--bg)}
.cat-funding{background:#f778ba;color:var(--bg)}

.issue-content{min-width:0}
.issue-title{
  font-size:0.95rem;font-weight:400;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.issue-title:hover{color:var(--primary)}
.issue-meta{
  display:flex;align-items:center;gap:0.5rem;margin-top:0.25rem;flex-wrap:wrap;
}
.issue-label{
  font-size:0.7rem;padding:0.15rem 0.5rem;border-radius:12px;
  font-weight:700;white-space:nowrap;
}
.label-official{background:rgba(88,166,255,0.15);color:var(--primary)}
.label-community{background:rgba(188,140,255,0.15);color:var(--purple)}
.label-media{background:rgba(210,153,34,0.15);color:var(--orange)}
.label-individual{background:rgba(63,185,80,0.15);color:var(--green)}

.issue-source{
  font-size:0.8rem;color:var(--text-secondary);white-space:nowrap;
}
.issue-time{
  font-size:0.75rem;color:var(--text-tertiary);white-space:nowrap;
  font-family:var(--font-data);
}
.issue-score{
  background:var(--surface);border:1px solid var(--border);
  padding:0.25rem 0.6rem;border-radius:12px;font-size:0.8rem;
  font-weight:700;font-family:var(--font-data);white-space:nowrap;
}
.score-high{border-color:var(--green);color:var(--green)}
.score-mid{border-color:var(--orange);color:var(--orange)}
.score-low{border-color:var(--text-tertiary);color:var(--text-tertiary)}

/* ── Expanded Detail (Comment Style) ── */
.issue-detail{
  display:none;padding:1rem 1rem 1rem 3rem;
  border-top:1px solid var(--border);background:var(--bg);
}
.issue-item.expanded .issue-detail{display:block}
.comment-box{
  background:var(--surface);border:1px solid var(--border);border-radius:6px;
  padding:1rem;position:relative;
}
.comment-header{
  display:flex;align-items:center;gap:0.75rem;margin-bottom:0.75rem;
}
.comment-avatar{
  width:32px;height:32px;border-radius:50%;background:var(--border);
  display:flex;align-items:center;justify-content:center;color:var(--text-secondary);
  font-size:0.75rem;font-weight:700;
}
.comment-author{font-size:0.85rem;color:var(--text-secondary)}
.comment-body{font-size:0.9rem;color:var(--text);line-height:1.6;margin-bottom:0.75rem}
.comment-quote{
  background:var(--bg);border-left:3px solid var(--primary);
  padding:0.75rem 1rem;margin-top:0.75rem;border-radius:3px;
}
.quote-label{
  font-size:0.75rem;color:var(--text-secondary);text-transform:uppercase;
  letter-spacing:0.5px;margin-bottom:0.25rem;
}
.quote-text{font-size:0.9rem;color:var(--primary);line-height:1.5}
.comment-tags{display:flex;flex-wrap:wrap;gap:0.4rem;margin-top:0.75rem}
.tag{
  font-size:0.75rem;color:var(--text-secondary);background:var(--bg);
  border:1px solid var(--border);padding:0.15rem 0.5rem;border-radius:12px;
}

/* ── Footer ── */
.footer{
  margin-top:3rem;padding-top:2rem;border-top:1px solid var(--border);
  text-align:center;color:var(--text-secondary);font-size:0.85rem;
}
.footer a{color:var(--primary);text-decoration:none}
.footer a:hover{text-decoration:underline}

/* ── Responsive ── */
@media(max-width:768px){
  html{font-size:13px}
  .container{padding:1rem}
  .header{flex-direction:column;align-items:flex-start;gap:0.75rem}
  .stats-banner{flex-direction:column;align-items:flex-start}
  .stats-left{flex-direction:column;gap:0.5rem;align-items:flex-start}
  .filter-bar{flex-direction:column;align-items:stretch}
  .search-box{min-width:100%}
  .issue-row{
    grid-template-columns:auto 1fr;
    grid-template-rows:auto auto;
    gap:0.5rem;
  }
  .issue-icon{grid-row:1;grid-column:1}
  .issue-content{grid-row:1;grid-column:2}
  .issue-source{grid-row:2;grid-column:1 / -1;font-size:0.75rem}
  .issue-time{grid-row:2;grid-column:1 / -1}
  .issue-score{grid-row:2;grid-column:1 / -1;justify-self:end}
  .issue-detail{padding-left:1rem}
}
</style>
</head>

// ── Render ──
function renderList(data) {
  const list = document.getElementById('issueList');
  list.innerHTML = '';
  data.forEach((a, i) => {
    const scoreClass = a.score >= 8 ? 'score-high' : a.score >= 6 ? 'score-mid' : 'score-low';
    const srcClass = 'label-' + a.sourceType;
    const catClass = 'cat-' + a.category;
    const item = document.createElement('div');
    item.className = 'issue-item';
    item.innerHTML = `
      <div class="issue-row">
        <div class="issue-icon ${catClass}">${a.catLabel}</div>
        <div class="issue-content">
          <div class="issue-title">${a.title}</div>
          <div class="issue-meta">
            <span class="issue-label ${srcClass}">${a.sourceType}</span>
            <span class="issue-source">${a.source}</span>
            <span class="issue-time">${a.time}</span>
          </div>
        </div>
        <span class="issue-score ${scoreClass}">${a.score}</span>
      </div>
      <div class="issue-detail">
        <div class="comment-box">
          <div class="comment-header">
            <div class="comment-avatar">AI</div>
            <span class="comment-author">ai-radar-bot commented</span>
          </div>
          <div class="comment-body">${a.summary}</div>
          <div class="comment-quote">
            <div class="quote-label">Why it matters</div>
            <div class="quote-text">${a.why}</div>
          </div>
          <div class="comment-tags">${a.tags.map(t => `<span class="tag">#${t}</span>`).join('')}</div>
        </div>
      </div>`;
    item.querySelector('.issue-row').addEventListener('click', () => {
      item.classList.toggle('expanded');
    });
    list.appendChild(item);
  });
}

// ── Filters ──
let activeSource = 'all';
let activeCat = 'all';
let minScore = 0;

function applyFilters() {
  let filtered = articles.filter(a => {
    if (activeSource !== 'all' && a.sourceType !== activeSource) return false;
    if (activeCat !== 'all' && a.category !== activeCat) return false;
    if (a.score < minScore) return false;
    return true;
  });
  filtered.sort((a, b) => b.score - a.score);
  renderList(filtered);
}

// ── Search ──
document.getElementById('searchInput').addEventListener('input', e => {
  const query = e.target.value.toLowerCase();
  const items = document.querySelectorAll('.issue-item');
  items.forEach(item => {
    const title = item.querySelector('.issue-title').textContent.toLowerCase();
    item.style.display = title.includes(query) ? '' : 'none';
  });
});

// ── Init ──
renderList(articles);
</script>
