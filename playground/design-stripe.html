<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0e27;

  --teal: #0ACF97;

  --text-dim: #6b7280;
  --border: rgba(255,255,255,0.08);
  --font-h: 'Sora', sans-serif;
  --font-b: 'DM Sans', sans-serif;
  --r: 14px; --r-sm: 10px; --r-pill: 100px;
}
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-b); background: var(--bg); color: var(--text);

}
/* MESH BG */
.mesh-bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
.mesh-bg .blob { position: absolute; border-radius: 50%; filter: blur(130px); opacity: 0.35; animation: bf 25s ease-in-out infinite alternate; }
.blob-1 { width: 700px; height: 700px; background: radial-gradient(circle, rgba(99,91,255,0.5) 0%, transparent 70%); top: -15%; left: -10%; animation-duration: 30s; }
.blob-2 { width: 600px; height: 600px; background: radial-gradient(circle, rgba(0,212,255,0.3) 0%, transparent 70%); top: 40%; right: -10%; animation-duration: 22s; animation-delay: -5s; }
.blob-3 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(122,115,255,0.3) 0%, transparent 70%); bottom: -10%; left: 30%; animation-duration: 28s; animation-delay: -10s; }
.blob-4 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(10,207,151,0.18) 0%, transparent 70%); top: 20%; left: 50%; animation-duration: 20s; animation-delay: -8s; }
@keyframes bf { 0%{transform:translate(0,0) scale(1)} 33%{transform:translate(40px,-30px) scale(1.05)} 66%{transform:translate(-20px,20px) scale(.95)} 100%{transform:translate(30px,-10px) scale(1.02)} }
.noise { position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: .025; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); background-repeat: repeat; background-size: 256px; }
/* NAV */
nav { position: sticky; top: 0; z-index: 100; background: rgba(10,14,39,0.82); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border-bottom: 1px solid rgba(255,255,255,0.06); padding: 0 2rem; }
.nav-inner { max-width: 1280px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 64px; }
.logo-group { display: flex; align-items: center; gap: 10px; }
.logo-icon { width: 32px; height: 32px; border-radius: 8px; background: linear-gradient(135deg, var(--primary), var(--cyan)); display: flex; align-items: center; justify-content: center; position: relative; }
.logo-icon::after { content: ''; position: absolute; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.9); border-radius: 50%; }
.logo-icon::before { content: ''; position: absolute; width: 5px; height: 5px; background: rgba(255,255,255,0.9); border-radius: 50%; }
.logo-text { font-family: var(--font-h); font-weight: 700; font-size: 1.15rem; letter-spacing: 1.5px; }
.nav-links { display: flex; gap: 2rem; list-style: none; }

.nav-links a:hover, .nav-links a.active { color: var(--text); }
.nav-time { font-family: var(--font-b); font-size: .78rem; color: var(--text-dim); font-variant-numeric: tabular-nums; }
/* CONTAINER */
.container { position: relative; z-index: 2; max-width: 1280px; margin: 0 auto; padding: 2rem; }

.stat-card:hover { border-color: rgba(99,91,255,0.25); box-shadow: 0 4px 20px rgba(99,91,255,0.08); }
.stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--primary), transparent); opacity: .6; }
.stat-card:nth-child(2)::before { background: linear-gradient(90deg, transparent, var(--cyan), transparent); }
.stat-card:nth-child(3)::before { background: linear-gradient(90deg, transparent, var(--teal), transparent); }
.stat-card:nth-child(4)::before { background: linear-gradient(90deg, transparent, var(--primary-light), transparent); }
.stat-number { font-family: var(--font-h); font-size: 2rem; font-weight: 700; line-height: 1.2; background: linear-gradient(135deg, var(--text), var(--primary-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.stat-card:nth-child(2) .stat-number { background: linear-gradient(135deg, var(--text), var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.stat-card:nth-child(3) .stat-number { background: linear-gradient(135deg, var(--text), var(--teal)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.stat-card:nth-child(4) .stat-number { background: linear-gradient(135deg, var(--primary-light), var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.stat-label { font-size: .8rem; color: var(--text-dim); margin-top: 4px; font-weight: 500; }
/* FILTER BAR */
.filter-bar { display: flex; flex-wrap: wrap; align-items: center; gap: .75rem; margin-bottom: 1rem; padding: 1.2rem 1.5rem; background: var(--bg-card); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: var(--r); }
.search-box { flex: 0 0 260px; position: relative; }
.search-box input { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: var(--r-sm); padding: 9px 12px 9px 38px; color: var(--text); font-family: var(--font-b); font-size: .85rem; outline: none; transition: border-color .3s, box-shadow .3s; }
.search-box input::placeholder { color: var(--text-dim); }
.search-box input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99,91,255,0.15); }
.search-box svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; stroke: var(--text-dim); }
.fdiv { width: 1px; height: 28px; background: var(--border); margin: 0 .25rem; flex-shrink: 0; }
.filter-pills { display: flex; flex-wrap: wrap; gap: .4rem; flex: 1; }
.pill { font-family: var(--font-b); font-size: .78rem; font-weight: 500; padding: 6px 14px; border-radius: var(--r-pill); border: 1px solid rgba(255,255,255,0.08); background: transparent; color: var(--text-sec); cursor: pointer; transition: all .25s; white-space: nowrap; }
.pill:hover { border-color: rgba(99,91,255,0.3); color: var(--text); background: rgba(99,91,255,0.06); }
.pill.active { border-color: var(--primary); color: #fff; background: linear-gradient(135deg, rgba(99,91,255,0.2), rgba(122,115,255,0.12)); box-shadow: 0 0 12px rgba(99,91,255,0.15); }
/* ROW 2 */
.filter-row-2 { display: flex; flex-wrap: wrap; align-items: center; gap: 1rem; margin-bottom: 2rem; }
.source-select { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: var(--r-sm); padding: 8px 32px 8px 12px; color: var(--text); font-family: var(--font-b); font-size: .84rem; outline: none; cursor: pointer; appearance: none; background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%236b7280' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: right 12px center; transition: border-color .3s; }
.source-select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99,91,255,0.15); }
.score-group { display: flex; align-items: center; gap: .6rem; font-size: .82rem; color: var(--text-sec); }
.score-group label { white-space: nowrap; font-weight: 500; }
.score-group input[type="range"] { -webkit-appearance: none; appearance: none; width: 140px; height: 4px; border-radius: 2px; background: linear-gradient(90deg, var(--primary), var(--cyan)); outline: none; cursor: pointer; }
.score-group input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #fff; border: 2px solid var(--primary); box-shadow: 0 0 8px rgba(99,91,255,0.3); cursor: pointer; }
.score-val { font-family: var(--font-h); font-weight: 600; color: var(--primary-light); min-width: 28px; text-align: center; }
/* CARD GRID */
.card-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 1.25rem; }
.card-grid .card:first-child { grid-column: 1 / -1; }
/* CARD */
.card { background: var(--bg-card); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: var(--r); padding: 1.5rem; position: relative; overflow: hidden; cursor: pointer; transition: transform .3s, box-shadow .3s, border-color .3s, background .3s; opacity: 0; transform: translateY(16px); animation: ci .5s ease forwards; }
.card:hover { transform: translateY(-2px); box-shadow: 0 8px 40px rgba(99,91,255,0.12), 0 2px 8px rgba(0,0,0,0.2); border-color: rgba(99,91,255,0.2); background: var(--bg-card-hover); }
.card.featured { background: linear-gradient(135deg, rgba(99,91,255,0.08), rgba(0,212,255,0.05)); border-color: rgba(99,91,255,0.18); }

.score-pill { font-family: var(--font-h); font-size: .72rem; font-weight: 600; padding: 4px 10px; border-radius: var(--r-pill); background: rgba(255,255,255,0.06); color: var(--text-sec); display: flex; align-items: center; gap: 5px; }
.score-pill .sd { width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim); }

.card-title { font-family: var(--font-h); font-size: 1.02rem; font-weight: 600; line-height: 1.5; margin-bottom: .5rem; color: var(--text); transition: color .25s; }
.card:hover .card-title { color: #fff; }
.card-summary { font-size: .85rem; line-height: 1.7; color: var(--text-sec); margin-bottom: .75rem; }
.card-meta { display: flex; align-items: center; gap: 8px; font-size: .75rem; color: var(--text-dim); }
.card-meta .ms { font-weight: 500; color: var(--text-sec); }

/* FOOTER */
footer { position: relative; z-index: 2; text-align: center; padding: 3rem 2rem 2rem; color: var(--text-dim); font-size: .78rem; }

// Populate source filter
const sources = [...new Set(articles.map(a => a.source))].sort();
const srcSel = document.getElementById('sourceFilter');
sources.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; srcSel.appendChild(o); });

// Score slider
const slider = document.getElementById('scoreSlider');
const scoreDisp = document.getElementById('scoreValue');
slider.addEventListener('input', () => { scoreDisp.textContent = slider.value; applyFilters(); });

// Score pill class
function scoreCls(s) { return s >= 90 ? 'critical' : s >= 80 ? 'high' : ''; }

// Render
function renderCards(data) {
  const grid = document.getElementById('cardGrid');
  grid.innerHTML = '';
  if (data.length === 0) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--text-dim);font-size:.9rem;">没有匹配的资讯</div>';
    return;
  }
  data.forEach((a, i) => {
    const card = document.createElement('div');
    card.className = 'card' + (i === 0 ? ' featured' : '');
    card.dataset.category = a.category;
    card.style.animationDelay = (i * 0.06) + 's';
    card.innerHTML = `
      <div class="card-header">
        <span class="card-cat cat-${a.category}">${a.catLabel}</span>
        <span class="score-pill ${scoreCls(a.score)}"><span class="sd"></span>${a.score}</span>
      </div>
      <div class="card-title">${a.title}</div>
      <div class="card-summary">${a.summary}</div>
      <div class="card-meta">
        <span class="ms">${a.source}</span>
        <span class="md"></span>
        <span>${a.time}</span>
      </div>
      ${a.why ? `<div class="why-box"><div class="wl">为什么重要</div><p>${a.why}</p></div>` : ''}
      <div class="expand-hint">
        <span class="eh-text">展开详情</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
    `;
    card.addEventListener('click', () => {
      card.classList.toggle('expanded');
      const hint = card.querySelector('.eh-text');
      hint.textContent = card.classList.contains('expanded') ? '收起' : '展开详情';
    });
    grid.appendChild(card);
  });
}

// Filter logic
let activeCategory = 'all';
function applyFilters() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const src = srcSel.value;
  const minScore = parseInt(slider.value);
  let filtered = articles;
  if (activeCategory !== 'all') filtered = filtered.filter(a => a.category === activeCategory);
  if (src !== 'all') filtered = filtered.filter(a => a.source === src);
  if (minScore > 0) filtered = filtered.filter(a => a.score >= minScore);
  if (q) filtered = filtered.filter(a => a.title.toLowerCase().includes(q) || a.summary.toLowerCase().includes(q) || a.source.toLowerCase().includes(q) || a.catLabel.includes(q));
  renderCards(filtered);
}

// Category pills
document.querySelectorAll('.pill').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeCategory = btn.dataset.filter;
    applyFilters();
  });
});

// Search
document.getElementById('searchInput').addEventListener('input', applyFilters);

// Source filter
srcSel.addEventListener('change', applyFilters);

// Initial render
renderCards(articles);
</script>
</body>
</html>
