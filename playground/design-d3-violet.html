<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>AI RADAR — 全球AI资讯聚合平台 (Violet Synthwave)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* === RESET & BASE === */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0c0a14;
  --bg-card: rgba(18, 14, 30, 0.65);
  --pink: #a78bfa;
  --cyan: #f472b6;
  --lime: #c084fc;
  --text: #e2dff0;
  --text-dim: #7a7590;
  --border: rgba(167, 139, 250, 0.06);
  --glow-pink: 0 0 20px rgba(167, 139, 250, 0.5);
  --glow-cyan: 0 0 20px rgba(244, 114, 182, 0.5);
  --glow-lime: 0 0 20px rgba(192, 132, 252, 0.5);
  --font-display: 'Orbitron', sans-serif;
  --font-body: 'Exo 2', sans-serif;
}
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.6;
}

/* === ANIMATED GRADIENT MESH BG === */
.mesh-bg {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 600px 600px at 20% 20%, rgba(167,139,250,0.07) 0%, transparent 70%),
    radial-gradient(ellipse 500px 500px at 80% 60%, rgba(244,114,182,0.06) 0%, transparent 70%),
    radial-gradient(ellipse 400px 400px at 50% 90%, rgba(192,132,252,0.05) 0%, transparent 70%);
  animation: meshMove 20s ease-in-out infinite alternate;
}
@keyframes meshMove {
  0% { background-position: 0% 0%, 100% 50%, 50% 100%; }
  50% { background-position: 30% 20%, 70% 80%, 20% 60%; }
  100% { background-position: 60% 40%, 40% 20%, 80% 70%; }
}

/* === SCANLINE OVERLAY === */
.scanlines {
  position: fixed; inset: 0; z-index: 1; pointer-events: none;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px
  );
}

/* === NAV === */
nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(12, 10, 20, 0.85);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem;
}
.nav-inner {
  max-width: 1400px; margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between;
  height: 64px;
}
.logo-group { display: flex; align-items: center; gap: 12px; }

/* CSS Radar Sweep Icon */
.radar-icon {
  width: 36px; height: 36px; position: relative;
  border: 2px solid var(--cyan);
  border-radius: 50%;
  box-shadow: var(--glow-cyan);
}
.radar-icon::before {
  content: '';
  position: absolute; top: 50%; left: 50%;
  width: 50%; height: 50%;
  transform-origin: 0% 0%;
  background: conic-gradient(from 0deg, transparent 0deg, rgba(244,114,182,0.4) 60deg, transparent 60deg);
  animation: radarSweep 2.5s linear infinite;
  border-radius: 0 100% 0 0;
}
.radar-icon::after {
  content: '';
  position: absolute; top: 50%; left: 50%;
  width: 4px; height: 4px; margin: -2px 0 0 -2px;
  background: var(--cyan);
  border-radius: 50%;
  box-shadow: 0 0 6px var(--cyan);
}
@keyframes radarSweep { to { transform: rotate(360deg); } }

.logo-text {
  font-family: var(--font-display);
  font-weight: 800; font-size: 1.3rem;
  letter-spacing: 3px;
  background: linear-gradient(135deg, var(--cyan), var(--pink));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: none;
  filter: drop-shadow(0 0 8px rgba(244,114,182,0.3));
}

.nav-links { display: flex; gap: 2rem; list-style: none; }
.nav-links a {
  font-family: var(--font-body);
  font-weight: 500; font-size: 0.9rem;
  color: var(--text-dim);
  text-decoration: none;
  padding: 4px 0;
  position: relative;
  transition: color 0.3s;
}
.nav-links a::after {
  content: ''; position: absolute; bottom: -2px; left: 0;
  width: 0; height: 2px;
  background: var(--cyan);
  box-shadow: var(--glow-cyan);
  transition: width 0.3s;
}
.nav-links a:hover, .nav-links a.active { color: var(--cyan); }
.nav-links a:hover::after, .nav-links a.active::after { width: 100%; }
.nav-time {
  font-family: var(--font-display);
  font-size: 0.75rem; color: var(--text-dim);
  letter-spacing: 1px;
}

/* === MAIN CONTAINER === */
.container {
  position: relative; z-index: 2;
  max-width: 1400px; margin: 0 auto;
  padding: 2rem;
}

/* === STATS BAR === */
.stats-bar {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1rem;
  margin-bottom: 2rem;
}
.stat-card {
  background: var(--bg-card);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.2rem 1.5rem;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.stat-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--cyan), transparent);
}
.stat-card:nth-child(2)::before { background: linear-gradient(90deg, transparent, var(--pink), transparent); }
.stat-card:nth-child(3)::before { background: linear-gradient(90deg, transparent, var(--lime), transparent); }
.stat-card:nth-child(4)::before { background: linear-gradient(90deg, transparent, var(--cyan), var(--pink), transparent); }

.stat-number {
  font-family: var(--font-display);
  font-size: 2.2rem; font-weight: 800;
  color: var(--cyan);
  text-shadow: 0 0 20px rgba(244,114,182,0.4);
  line-height: 1.2;
}
.stat-card:nth-child(2) .stat-number { color: var(--pink); text-shadow: 0 0 20px rgba(167,139,250,0.4); }
.stat-card:nth-child(3) .stat-number { color: var(--lime); text-shadow: 0 0 20px rgba(192,132,252,0.4); }
.stat-card:nth-child(4) .stat-number {
  background: linear-gradient(135deg, var(--cyan), var(--pink));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; filter: drop-shadow(0 0 10px rgba(244,114,182,0.3));
}
.stat-label { font-size: 0.8rem; color: var(--text-dim); margin-top: 4px; letter-spacing: 0.5px; }
.pulse { animation: pulse 2s ease-in-out infinite; }
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; transform: scale(1.02); }
}

/* === FILTER BAR === */
.filter-bar {
  display: flex; flex-wrap: wrap; align-items: center; gap: 0.75rem;
  margin-bottom: 2rem;
  padding: 1.2rem 1.5rem;
  background: var(--bg-card);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  border-radius: 12px;
}
.search-box {
  flex: 0 0 280px;
  position: relative;
}
.search-box input {
  width: 100%;
  background: rgba(167,139,250,0.04);
  border: 1px solid rgba(167,139,250,0.1);
  border-radius: 8px;
  padding: 8px 12px 8px 36px;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 0.85rem;
  outline: none;
  transition: border-color 0.3s, box-shadow 0.3s;
}
.search-box input::placeholder { color: var(--text-dim); }
.search-box input:focus {
  border-color: var(--cyan);
  box-shadow: 0 0 12px rgba(244,114,182,0.25), inset 0 0 6px rgba(244,114,182,0.05);
}

.search-box svg {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  width: 16px; height: 16px; stroke: var(--text-dim);
}
.filter-pills { display: flex; flex-wrap: wrap; gap: 0.5rem; flex: 1; }
.pill {
  font-family: var(--font-body);
  font-size: 0.8rem; font-weight: 500;
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid rgba(167,139,250,0.12);
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.3s;
  white-space: nowrap;
}
.pill:hover {
  border-color: var(--cyan);
  color: var(--cyan);
  box-shadow: 0 0 10px rgba(244,114,182,0.15);
}
.pill.active {
  border-color: var(--cyan);
  color: var(--cyan);
  background: rgba(244,114,182,0.08);
  box-shadow: 0 0 14px rgba(244,114,182,0.2);
}

/* === MASONRY GRID === */
.masonry {
  columns: 3;
  column-gap: 1.2rem;
}
.card {
  break-inside: avoid;
  margin-bottom: 1.2rem;
  background: var(--bg-card);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(167,139,250,0.06);
  border-radius: 14px;
  padding: 1.5rem;
  position: relative;
  overflow: hidden;
  transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
}
.card::before {
  content: ''; position: absolute; inset: -1px;
  border-radius: 14px;
  padding: 1px;
  background: linear-gradient(135deg, transparent 40%, rgba(244,114,182,0.15) 50%, transparent 60%);
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude;
  opacity: 0; transition: opacity 0.4s;
  pointer-events: none;
}

.card:hover::before { opacity: 1; }
.card:hover {
  transform: translateY(-3px);
  box-shadow: 0 0 30px rgba(244,114,182,0.1);
  border-color: rgba(244,114,182,0.2);
}
.card:nth-child(3n+2):hover {
  box-shadow: 0 0 30px rgba(167,139,250,0.1);
  border-color: rgba(167,139,250,0.2);
}
.card:nth-child(3n+2)::before {
  background: linear-gradient(135deg, transparent 40%, rgba(167,139,250,0.15) 50%, transparent 60%);
}
.card:nth-child(3n):hover {
  box-shadow: 0 0 30px rgba(192,132,252,0.1);
  border-color: rgba(192,132,252,0.2);
}
.card:nth-child(3n)::before {
  background: linear-gradient(135deg, transparent 40%, rgba(192,132,252,0.15) 50%, transparent 60%);
}

/* Card header */
.card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.75rem; }
.card-category {
  font-size: 0.7rem; font-weight: 600;
  padding: 3px 10px;
  border-radius: 12px;
  background: rgba(244,114,182,0.1);
  color: var(--cyan);
  border: 1px solid rgba(244,114,182,0.2);
  letter-spacing: 0.3px;
}
.cat-product { background: rgba(167,139,250,0.1); color: var(--pink); border-color: rgba(167,139,250,0.2); }
.cat-paper { background: rgba(192,132,252,0.1); color: var(--lime); border-color: rgba(192,132,252,0.2); }
.cat-industry { background: rgba(244,114,182,0.1); color: var(--cyan); border-color: rgba(244,114,182,0.2); }
.cat-funding { background: rgba(167,139,250,0.1); color: var(--pink); border-color: rgba(167,139,250,0.2); }
.cat-policy { background: rgba(192,132,252,0.1); color: var(--lime); border-color: rgba(192,132,252,0.2); }
.cat-opensource { background: rgba(244,114,182,0.1); color: var(--cyan); border-color: rgba(244,114,182,0.2); }
.cat-opinion { background: rgba(167,139,250,0.1); color: var(--pink); border-color: rgba(167,139,250,0.2); }

/* Importance gauge ring */
.importance-ring {
  width: 42px; height: 42px;
  position: relative; flex-shrink: 0;
}
.importance-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.importance-ring circle {
  fill: none; stroke-width: 3; cx: 21; cy: 21; r: 17;
}
.importance-ring .ring-bg { stroke: rgba(167,139,250,0.06); }
.importance-ring .ring-fill {
  stroke: var(--cyan);
  stroke-dasharray: 106.8;
  stroke-dashoffset: 106.8;
  stroke-linecap: round;
  filter: drop-shadow(0 0 4px rgba(244,114,182,0.5));
  transition: stroke-dashoffset 1s ease-out;
}
.importance-ring .ring-fill.pink { stroke: var(--pink); filter: drop-shadow(0 0 4px rgba(167,139,250,0.5)); }
.importance-ring .ring-fill.lime { stroke: var(--lime); filter: drop-shadow(0 0 4px rgba(192,132,252,0.5)); }
.importance-ring .ring-score {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display);
  font-size: 0.65rem; font-weight: 700;
  color: var(--text);
}

.card-title {
  font-family: var(--font-body);
  font-size: 1.05rem; font-weight: 700;
  line-height: 1.5;
  margin-bottom: 0.6rem;
  color: #ede9ff;
}
.card-summary {
  font-size: 0.85rem; line-height: 1.7;
  color: var(--text-dim);
  margin-bottom: 0.8rem;
}
.card-source {
  font-size: 0.72rem; color: var(--text-dim);
  display: flex; align-items: center; gap: 6px;
}
.card-source .dot {
  width: 4px; height: 4px; border-radius: 50%;
  background: var(--cyan);
  box-shadow: 0 0 4px var(--cyan);
}

/* Why it matters callout */
.why-box {
  margin-top: 0.8rem;
  padding: 0.75rem 1rem;
  border-left: 2px solid var(--pink);
  background: rgba(167,139,250,0.04);
  border-radius: 0 8px 8px 0;
  box-shadow: -2px 0 12px rgba(167,139,250,0.08);
}
.why-box .why-label {
  font-family: var(--font-display);
  font-size: 0.65rem; font-weight: 600;
  color: var(--pink);
  letter-spacing: 1px;
  margin-bottom: 4px;
  text-transform: uppercase;
}
.why-box p {
  font-size: 0.8rem; line-height: 1.6;
  color: var(--text);
}

/* === FOOTER === */
footer {
  position: relative; z-index: 2;
  text-align: center;
  padding: 3rem 2rem 2rem;
  color: var(--text-dim);
  font-size: 0.75rem;
}
footer .footer-line {
  width: 200px; height: 1px; margin: 0 auto 1rem;
  background: linear-gradient(90deg, transparent, var(--cyan), transparent);
}

/* === RESPONSIVE === */
@media (max-width: 1100px) {
  .masonry { columns: 2; }
  .stats-bar { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 700px) {
  .masonry { columns: 1; }
  .stats-bar { grid-template-columns: repeat(2, 1fr); }
  .nav-links { display: none; }
  .filter-bar { flex-direction: column; }
  .search-box { flex: 1 1 100%; width: 100%; }
  .filter-pills { justify-content: center; }
  .stat-number { font-size: 1.6rem; }
  .container { padding: 1rem; }
  nav { padding: 0 1rem; }
}

/* === ANIMATIONS === */
.card { opacity: 0; transform: translateY(20px); animation: fadeUp 0.6s forwards; }
.card:nth-child(1) { animation-delay: 0.05s; }
.card:nth-child(2) { animation-delay: 0.1s; }
.card:nth-child(3) { animation-delay: 0.15s; }
.card:nth-child(4) { animation-delay: 0.2s; }
.card:nth-child(5) { animation-delay: 0.25s; }
.card:nth-child(6) { animation-delay: 0.3s; }
.card:nth-child(7) { animation-delay: 0.35s; }
.card:nth-child(8) { animation-delay: 0.4s; }
.card:nth-child(9) { animation-delay: 0.45s; }
.card:nth-child(10) { animation-delay: 0.5s; }
@keyframes fadeUp {
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

// Color helpers
const catColors = {
  model:'cyan', product:'pink', paper:'lime', industry:'cyan',
  funding:'pink', policy:'lime', opensource:'cyan', opinion:'pink'
};
function ringColor(cat) { return catColors[cat] || 'cyan'; }
function ringClass(cat) {
  const c = catColors[cat];
  return c === 'pink' ? ' pink' : c === 'lime' ? ' lime' : '';
}

// Render cards
function renderCards(data) {
  const grid = document.getElementById('masonryGrid');
  grid.innerHTML = '';
  data.forEach((a, i) => {
    const pct = a.importance / 100;
    const dashoffset = 106.8 - (106.8 * pct);
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.category = a.category;
    card.style.animationDelay = (i * 0.05) + 's';
    card.innerHTML = `
      <div class="card-header">
        <span class="card-category cat-${a.category}">${a.categoryLabel}</span>
        <div class="importance-ring">
          <svg viewBox="0 0 42 42">
            <circle class="ring-bg" cx="21" cy="21" r="17"/>
            <circle class="ring-fill${ringClass(a.category)}" cx="21" cy="21" r="17"
              style="stroke-dashoffset:${dashoffset}"/>
          </svg>
          <div class="ring-score">${a.importance}</div>
        </div>
      </div>
      <div class="card-title">${a.title}</div>
      <div class="card-summary">${a.summary}</div>
      ${a.why ? `<div class="why-box">
        <div class="why-label">为什么重要</div>
        <p>${a.why}</p>
      </div>` : ''}
      <div class="card-source" style="margin-top:0.8rem">
        <span class="dot"></span>
        <span>${a.source}</span>
        <span style="margin-left:auto;opacity:0.6">${a.time}</span>
      </div>
    `;
    grid.appendChild(card);
  });
}

renderCards(articles);

// Filter pills
document.querySelectorAll('.pill').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const f = btn.dataset.filter;
    const filtered = f === 'all' ? articles : articles.filter(a => a.category === f);
    renderCards(filtered);
  });
});

// Search
document.getElementById('searchInput').addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  if (!q) {
    document.querySelector('.pill[data-filter="all"]').click();
    return;
  }
  const filtered = articles.filter(a =>
    a.title.toLowerCase().includes(q) ||
    a.summary.toLowerCase().includes(q) ||
    a.source.toLowerCase().includes(q) ||
    a.categoryLabel.includes(q)
  );
  renderCards(filtered);
});
</script>
